<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次元·绘卷 — 三子辩</title>
<style>
/* ============================================
   Proposal Q: 次元·绘卷 (Anime Visual Novel)
   参考: 日本视觉小说UI, Persona 5美学, Fate/Grand Order
   角色: 庄周 / 尼采 / 波伏娃
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap');

:root {
  --bg-sakura: #fef5f7;
  --bg-night: #1a1a2e;
  --dialog-bg: rgba(20,20,40,0.88);
  --dialog-bg-alt: rgba(30,15,20,0.9);
  --zhuangzi-green: #2d5a27;
  --zhuangzi-green-light: #4a8a3f;
  --zhuangzi-glow: rgba(45,90,39,0.3);
  --nietzsche-red: #d43535;
  --nietzsche-red-light: #f05050;
  --nietzsche-glow: rgba(212,53,53,0.35);
  --beauvoir-blue: #2563eb;
  --beauvoir-blue-light: #5080f0;
  --beauvoir-glow: rgba(37,99,235,0.3);
  --text-light: #f0e8e8;
  --text-dim: rgba(240,232,232,0.7);
  --accent-gold: #d4a853;
  --speed-line: rgba(255,255,255,0.15);
  --screen-tone: rgba(0,0,0,0.04);
  --title-font: 'M PLUS Rounded 1c', 'Noto Sans SC', sans-serif;
  --body-font: 'Noto Sans SC', 'M PLUS Rounded 1c', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--body-font);
  background: #0a0a14;
  color: var(--text-light);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============================================
   PHONE FRAME (390x844 比例容器)
   ============================================ */
.phone-frame {
  position: relative;
  width: min(390px, 100vw);
  height: min(844px, 100vh);
  background: #0d0d1a;
  overflow: hidden;
  border-radius: 12px;
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.05),
    0 20px 60px rgba(0,0,0,0.5),
    0 0 120px rgba(37,99,235,0.08);
}

/* ============================================
   SCENE AREA: 上部60% — 角色立绘区
   ============================================ */
.scene-area {
  position: relative;
  width: 100%;
  height: 60%;
  overflow: hidden;
}

/* Scene backgrounds */
.scene-bg {
  position: absolute; inset: 0;
  transition: opacity 0.8s ease;
}

.scene-bg-1 {
  background: linear-gradient(180deg,
    #1a1a2e 0%,
    #16213e 30%,
    #0f3460 60%,
    #1a1a2e 100%
  );
}

.scene-bg-2 {
  background: linear-gradient(180deg,
    #2d1b2e 0%,
    #3d2040 30%,
    #1a1a2e 60%,
    #2d1b2e 100%
  );
  opacity: 0;
}

.scene-bg-3 {
  background: linear-gradient(180deg,
    #1a1a3e 0%,
    #0d2240 30%,
    #162040 60%,
    #1a1a3e 100%
  );
  opacity: 0;
}

/* Screen tone — 网点纸效果 */
.screen-tone-overlay {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 6px 6px;
  opacity: 0.6;
  pointer-events: none;
}

/* Stars */
.stars {
  position: absolute; inset: 0;
  pointer-events: none;
}

.star {
  position: absolute;
  width: 1.5px; height: 1.5px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}

.star:nth-child(1)  { top: 8%;  left: 12%; animation-delay: 0s; }
.star:nth-child(2)  { top: 15%; left: 30%; animation-delay: 0.7s; }
.star:nth-child(3)  { top: 22%; left: 55%; animation-delay: 1.4s; }
.star:nth-child(4)  { top: 12%; left: 75%; animation-delay: 2.1s; }
.star:nth-child(5)  { top: 30%; left: 18%; animation-delay: 0.3s; }
.star:nth-child(6)  { top: 25%; left: 65%; animation-delay: 1.1s; }
.star:nth-child(7)  { top: 35%; left: 42%; animation-delay: 1.8s; }
.star:nth-child(8)  { top: 18%; left: 88%; animation-delay: 2.5s; }
.star:nth-child(9)  { top: 5%;  left: 48%; animation-delay: 0.5s; }
.star:nth-child(10) { top: 40%; left: 78%; animation-delay: 1.6s; }
.star:nth-child(11) { top: 8%;  left: 22%; animation-delay: 2.2s; }
.star:nth-child(12) { top: 28%; left: 35%; animation-delay: 0.9s; }

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Falling petals — 飘落花瓣 */
.petals {
  position: absolute; inset: 0;
  pointer-events: none;
}

.petal {
  position: absolute;
  width: 10px; height: 6px;
  background: rgba(255,180,180,0.4);
  border-radius: 0 100% 0 100%;
  animation: petalFall linear infinite;
}

.petal:nth-child(1)  { left: 15%; animation-duration: 18s; animation-delay: 0s; }
.petal:nth-child(2)  { left: 35%; animation-duration: 20s; animation-delay: 3s; }
.petal:nth-child(3)  { left: 55%; animation-duration: 16s; animation-delay: 6s; }
.petal:nth-child(4)  { left: 75%; animation-duration: 19s; animation-delay: 2s; }
.petal:nth-child(5)  { left: 25%; animation-duration: 17s; animation-delay: 8s; }
.petal:nth-child(6)  { left: 65%; animation-duration: 20s; animation-delay: 5s; }
.petal:nth-child(7)  { left: 45%; animation-duration: 18s; animation-delay: 10s; }
.petal:nth-child(8)  { left: 85%; animation-duration: 15s; animation-delay: 4s; }

@keyframes petalFall {
  0% { top: -5%; opacity: 0; transform: rotate(0deg) translateX(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { top: 105%; opacity: 0; transform: rotate(360deg) translateX(30px); }
}

/* ============================================
   CHARACTER STANDING PORTRAIT (立绘)
   ============================================ */
.character-sprite {
  position: absolute;
  bottom: 0;
  width: 140px;
  height: 280px;
  transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
}

.character-sprite.active {
  transform: translateY(0);
  opacity: 1;
  filter: brightness(1);
}

.character-sprite.inactive {
  transform: translateY(20px) scale(0.9);
  opacity: 0.25;
  filter: brightness(0.5) blur(1px);
}

/* 庄周 — 飘然仙人轮廓 (左) */
.sprite-zhuangzi {
  left: 0px;
}

.sprite-zhuangzi .sprite-body {
  position: relative;
  width: 100%; height: 100%;
  background:
    /* Robe flowing lines */
    radial-gradient(ellipse 60% 8% at 50% 15%, rgba(45,90,39,0.3) 0%, transparent 100%),
    linear-gradient(175deg,
      transparent 0%,
      rgba(45,90,39,0.08) 15%,
      rgba(45,90,39,0.15) 25%,
      rgba(45,90,39,0.25) 35%,
      rgba(40,80,35,0.3) 45%,
      rgba(40,80,35,0.2) 55%,
      rgba(35,70,30,0.12) 70%,
      transparent 100%
    );
  clip-path: polygon(
    35% 8%, 65% 8%,
    70% 15%, 68% 25%,
    72% 35%, 65% 45%,
    70% 55%, 62% 65%,
    66% 75%, 58% 85%,
    60% 95%, 40% 95%,
    42% 85%, 34% 75%,
    38% 65%, 30% 55%,
    35% 45%, 28% 35%,
    32% 25%, 30% 15%
  );
  box-shadow:
    0 0 30px var(--zhuangzi-glow),
    inset 0 0 20px rgba(45,90,39,0.1);
}

/* Sleeve flutter */
.sprite-zhuangzi .sprite-sleeve {
  position: absolute;
  top: 28%; left: -25px;
  width: 40px; height: 60px;
  background: linear-gradient(160deg,
    rgba(45,90,39,0.2) 0%,
    rgba(45,90,39,0.3) 50%,
    transparent 100%
  );
  clip-path: polygon(50% 0%, 100% 20%, 90% 60%, 60% 100%, 30% 80%, 10% 40%);
  animation: sleeveFlutter 4s ease-in-out infinite;
}

@keyframes sleeveFlutter {
  0%, 100% { transform: rotate(-3deg) translateY(0); }
  50% { transform: rotate(5deg) translateY(-5px); }
}

/* Sash ribbon */
.sprite-zhuangzi .sprite-sash {
  position: absolute;
  top: 38%; left: 50%;
  width: 4px; height: 80px;
  background: linear-gradient(to bottom,
    rgba(255,220,180,0.4),
    rgba(255,200,160,0.2),
    transparent
  );
  transform: translateX(-50%);
}

/* 尼采 — 锐利几何战士 (右) */
.sprite-nietzsche {
  right: 0px;
}

.sprite-nietzsche .sprite-body {
  position: relative;
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 50% 6% at 50% 20%, rgba(212,53,53,0.35) 0%, transparent 100%),
    linear-gradient(180deg,
      transparent 0%,
      rgba(212,53,53,0.06) 10%,
      rgba(212,53,53,0.12) 20%,
      rgba(190,45,45,0.2) 30%,
      rgba(180,40,40,0.3) 40%,
      rgba(160,35,35,0.25) 50%,
      rgba(140,30,30,0.15) 65%,
      rgba(120,25,25,0.08) 80%,
      transparent 100%
    );
  clip-path: polygon(
    30% 5%, 70% 5%,
    75% 12%, 72% 22%,
    78% 30%, 70% 38%,
    76% 45%, 68% 52%,
    72% 60%, 65% 68%,
    70% 78%, 62% 88%,
    55% 95%, 45% 95%,
    38% 88%, 30% 78%,
    35% 68%, 28% 60%,
    32% 52%, 24% 45%,
    30% 38%, 22% 30%,
    28% 22%, 25% 12%
  );
  box-shadow:
    0 0 30px var(--nietzsche-glow),
    inset 0 0 20px rgba(212,53,53,0.1);
}

/* Angular coat edges */
.sprite-nietzsche .sprite-coat {
  position: absolute;
  top: 30%; left: 0; right: 0;
  height: 45%;
  background:
    linear-gradient(90deg,
      transparent 20%,
      rgba(212,53,53,0.25) 25%,
      rgba(212,53,53,0.35) 35%,
      rgba(180,40,40,0.3) 50%,
      rgba(212,53,53,0.35) 65%,
      rgba(212,53,53,0.25) 75%,
      transparent 80%
    );
  clip-path: polygon(
    20% 0%, 80% 0%,
    85% 10%, 78% 25%,
    82% 40%, 75% 55%,
    80% 70%, 72% 85%,
    65% 100%, 35% 100%,
    28% 85%, 20% 70%,
    25% 55%, 18% 40%,
    22% 25%, 15% 10%
  );
}

/* 波伏娃 — 知性学者剪影 (中) */
.sprite-beauvoir {
  left: 50%;
  transform: translateX(-50%);
}

.sprite-beauvoir .sprite-body {
  position: relative;
  width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 55% 7% at 50% 18%, rgba(37,99,235,0.3) 0%, transparent 100%),
    linear-gradient(178deg,
      transparent 0%,
      rgba(37,99,235,0.05) 12%,
      rgba(37,99,235,0.12) 22%,
      rgba(35,90,220,0.2) 32%,
      rgba(30,80,210,0.28) 42%,
      rgba(25,70,200,0.22) 52%,
      rgba(20,60,180,0.12) 68%,
      rgba(15,50,160,0.06) 82%,
      transparent 100%
    );
  clip-path: polygon(
    32% 6%, 68% 6%,
    72% 14%, 68% 24%,
    74% 32%, 66% 40%,
    70% 50%, 64% 58%,
    68% 66%, 60% 74%,
    65% 82%, 58% 90%,
    56% 95%, 44% 95%,
    42% 90%, 35% 82%,
    40% 74%, 32% 66%,
    36% 58%, 30% 50%,
    34% 40%, 26% 32%,
    32% 24%, 28% 14%
  );
  box-shadow:
    0 0 30px var(--beauvoir-glow),
    inset 0 0 20px rgba(37,99,235,0.1);
}

/* Book silhouette */
.sprite-beauvoir .sprite-book {
  position: absolute;
  bottom: 20%; left: 50%;
  width: 30px; height: 22px;
  background: linear-gradient(135deg,
    rgba(37,99,235,0.3) 0%,
    rgba(60,120,255,0.25) 50%,
    rgba(37,99,235,0.3) 100%
  );
  transform: translateX(-50%) rotate(-5deg);
  clip-path: polygon(0% 0%, 70% 0%, 100% 30%, 100% 100%, 30% 100%, 0% 70%);
}

/* Glasses silhouette */
.sprite-beauvoir .sprite-glasses {
  position: absolute;
  top: 22%; left: 50%;
  width: 50px; height: 14px;
  transform: translateX(-50%);
  border: 1.5px solid rgba(37,99,235,0.2);
  border-radius: 50%;
  clip-path: inset(0 0 0 0);
}

/* ============================================
   CONCENTRATION LINES (集中线)
   ============================================ */
.concentration-lines {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.concentration-lines.active {
  opacity: 0.5;
}

.c-line {
  position: absolute;
  width: 1px;
  background: rgba(255,255,255,0.3);
  transform-origin: center center;
}

/* Radial lines from center */
.c-line:nth-child(1)  { height: 200px; top: 20%; left: 49%; transform: rotate(0deg); }
.c-line:nth-child(2)  { height: 200px; top: 20%; left: 49%; transform: rotate(15deg); }
.c-line:nth-child(3)  { height: 200px; top: 20%; left: 49%; transform: rotate(30deg); }
.c-line:nth-child(4)  { height: 200px; top: 20%; left: 49%; transform: rotate(45deg); }
.c-line:nth-child(5)  { height: 200px; top: 20%; left: 49%; transform: rotate(60deg); }
.c-line:nth-child(6)  { height: 200px; top: 20%; left: 49%; transform: rotate(75deg); }
.c-line:nth-child(7)  { height: 200px; top: 20%; left: 49%; transform: rotate(90deg); }
.c-line:nth-child(8)  { height: 200px; top: 20%; left: 49%; transform: rotate(105deg); }
.c-line:nth-child(9)  { height: 200px; top: 20%; left: 49%; transform: rotate(120deg); }
.c-line:nth-child(10) { height: 200px; top: 20%; left: 49%; transform: rotate(135deg); }
.c-line:nth-child(11) { height: 200px; top: 20%; left: 49%; transform: rotate(150deg); }
.c-line:nth-child(12) { height: 200px; top: 20%; left: 49%; transform: rotate(165deg); }
.c-line:nth-child(13) { height: 200px; top: 20%; left: 49%; transform: rotate(180deg); }
.c-line:nth-child(14) { height: 200px; top: 20%; left: 49%; transform: rotate(195deg); }
.c-line:nth-child(15) { height: 200px; top: 20%; left: 49%; transform: rotate(210deg); }
.c-line:nth-child(16) { height: 200px; top: 20%; left: 49%; transform: rotate(225deg); }

/* ============================================
   MOOD INDICATORS (情绪指示器)
   ============================================ */
.mood-indicators {
  position: absolute;
  bottom: 12px;
  left: 0; right: 0;
  display: flex;
  justify-content: space-around;
  padding: 0 30px;
  pointer-events: none;
}

.mood-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  opacity: 0.5;
  transition: opacity 0.4s ease;
}

.mood-icon.active {
  opacity: 0.9;
}

/* 竹叶轻摇 — 庄周 */
.mood-bamboo {
  position: relative;
}

.mood-bamboo .leaf {
  display: block;
  width: 8px; height: 16px;
  background: linear-gradient(to top, var(--zhuangzi-green-light), rgba(45,90,39,0.1));
  border-radius: 0 80% 0 60%;
  transform: rotate(-15deg);
  animation: leafSway 3s ease-in-out infinite;
}

@keyframes leafSway {
  0%, 100% { transform: rotate(-15deg); }
  50% { transform: rotate(15deg); }
}

/* 火焰跳动 — 尼采 */
.mood-flame {
  position: relative;
}

.mood-flame .flame-core {
  display: block;
  width: 6px; height: 14px;
  background: linear-gradient(to top, var(--nietzsche-red), var(--nietzsche-red-light), rgba(255,150,50,0.4));
  border-radius: 3px 3px 0 0;
  clip-path: polygon(20% 100%, 50% 0%, 80% 100%);
  animation: flameFlicker 0.6s ease-in-out infinite alternate;
}

@keyframes flameFlicker {
  0% { clip-path: polygon(25% 100%, 50% 5%, 75% 100%); }
  100% { clip-path: polygon(18% 100%, 50% -5%, 82% 100%); }
}

/* 水滴涟漪 — 波伏娃 */
.mood-ripple {
  position: relative;
  width: 18px; height: 18px;
}

.mood-ripple::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1.5px solid var(--beauvoir-blue-light);
  border-radius: 50%;
  animation: waterRipple 2s ease-out infinite;
}

.mood-ripple::after {
  content: '';
  position: absolute;
  inset: 7px;
  border: 1px solid rgba(37,99,235,0.4);
  border-radius: 50%;
  animation: waterRipple 2s ease-out 0.5s infinite;
}

@keyframes waterRipple {
  0% { transform: scale(0.3); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

/* ============================================
   IMPACT TEXT (碰撞效果文字)
   ============================================ */
.impact-text {
  position: absolute;
  top: 30%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--title-font);
  font-size: 42px;
  font-weight: 800;
  color: rgba(255,255,255,0.12);
  text-shadow:
    0 0 20px rgba(255,255,255,0.1),
    0 0 40px rgba(255,200,100,0.15);
  pointer-events: none;
  animation: impactPop 0.8s cubic-bezier(0.36, 0, 0.66, -0.56);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.impact-text.show {
  opacity: 1;
}

@keyframes impactPop {
  0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
  40% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
}

/* ============================================
   SPEED LINES (速度线, collision)
   ============================================ */
.speed-lines {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.speed-lines.active {
  opacity: 0.4;
}

.speed-lines::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 8px,
    rgba(255,255,255,0.12) 8px,
    rgba(255,255,255,0.12) 9px
  );
  mask-image: radial-gradient(ellipse 40% 50% at center, black 0%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 40% 50% at center, black 0%, transparent 70%);
}

/* ============================================
   DIALOG AREA: 下部40%
   ============================================ */
.dialog-area {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(180deg,
    rgba(10,10,20,0.3) 0%,
    rgba(10,10,20,0.85) 15%,
    rgba(10,10,20,0.95) 100%
  );
  display: flex;
  flex-direction: column;
  padding: 20px 20px 24px;
}

/* Name tag */
.name-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  padding: 5px 16px;
  border-radius: 4px;
  font-family: var(--title-font);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  width: fit-content;
}

.name-tag.zhuangzi {
  background: linear-gradient(135deg, rgba(45,90,39,0.5), rgba(45,90,39,0.3));
  color: #a0d8a0;
  border-left: 3px solid var(--zhuangzi-green-light);
}

.name-tag.nietzsche {
  background: linear-gradient(135deg, rgba(212,53,53,0.5), rgba(212,53,53,0.3));
  color: #ffb0b0;
  border-left: 3px solid var(--nietzsche-red-light);
}

.name-tag.beauvoir {
  background: linear-gradient(135deg, rgba(37,99,235,0.5), rgba(37,99,235,0.3));
  color: #a0c0ff;
  border-left: 3px solid var(--beauvoir-blue-light);
}

/* ============================================
   SPEECH BUBBLES
   ============================================ */
.speech-bubble {
  flex: 1;
  padding: 16px 18px;
  border-radius: 8px;
  font-size: 15px;
  line-height: 2;
  letter-spacing: 0.5px;
  position: relative;
  transition: all 0.4s ease;
}

/* 庄周 — 柔和云朵形 */
.bubble-zhuangzi {
  background: linear-gradient(170deg,
    rgba(35,70,30,0.5) 0%,
    rgba(25,55,25,0.6) 100%
  );
  border-radius: 6px 18px 18px 12px;
  border: 0.5px solid rgba(74,138,63,0.3);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 2px 12px rgba(45,90,39,0.15);
}

.bubble-zhuangzi::after {
  content: '';
  position: absolute; top: -6px; left: 20px;
  width: 14px; height: 8px;
  background: rgba(35,70,30,0.5);
  clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
}

/* 尼采 — 锐利多边形 (Persona 5 cut-in style) */
.bubble-nietzsche {
  background: linear-gradient(175deg,
    rgba(60,20,20,0.6) 0%,
    rgba(45,15,15,0.7) 100%
  );
  border-radius: 2px 10px 2px 10px;
  border-top: 2px solid var(--nietzsche-red);
  border-bottom: 2px solid rgba(212,53,53,0.4);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.03),

.history-arrow {

@keyframes arrowHint {

.history-panel {

}

.history-entry {

.nav-hint {

}

@keyframes hintPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* ============================================
   PAGE FLIP TRANSITION
   ============================================ */
.page-flip-overlay {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.page-flip-overlay.active {
  animation: pageFlip 0.6s ease-in-out;
}

@keyframes pageFlip {
  0% {
    opacity: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    clip-path: inset(0 100% 0 0);
  }
  30% {
    opacity: 1;
    clip-path: inset(0 50% 0 0);
  }
  70% {
    opacity: 1;
    clip-path: inset(0 0 0 50%);
  }
  100% {
    opacity: 0;
    clip-path: inset(0 0 0 100%);
  }
}

      s.classList.remove('active', 'idle'); s.classList.add('inactive');
    });
    [moodZ, moodN, moodB].forEach(m => m.classList.remove('active'));

    if (speaker === 'zhuangzi') {
      spriteZ.classList.remove('inactive'); spriteZ.classList.add('active');
      if (withIdle) spriteZ.classList.add('idle');
      moodZ.classList.add('active');
    } else if (speaker === 'nietzsche') {
      spriteN.classList.remove('inactive'); spriteN.classList.add('active');
      if (withIdle) spriteN.classList.add('idle');
      moodN.classList.add('active');
    } else if (speaker === 'beauvoir') {
      spriteB.classList.remove('inactive'); spriteB.classList.add('active');
      if (withIdle) spriteB.classList.add('idle');
      moodB.classList.add('active');
    }
  }

  /* Show scene background */
  function showScene(idx) {
    [sceneBg1, sceneBg2, sceneBg3].forEach(bg => bg.style.opacity = '0');
    if (idx === 0) sceneBg1.style.opacity = '1';
    else if (idx === 1) sceneBg2.style.opacity = '1';
    else sceneBg3.style.opacity = '1';
  }

  /* Update status dots */
  function updateStatus(sceneIdx) {
    const crystals = statusRounds.querySelectorAll('.crystal-indicator');
    crystals.forEach((c, i) => c.classList.toggle('active', i === sceneIdx));
  }

  /* Trigger collision effects */
  function triggerCollision(impactChar) {
    /* Speed lines */
    speedLines.classList.add('active');
    setTimeout(() => speedLines.classList.remove('active'), 800);

    /* Concentration lines */
    concentrationLines.classList.add('active');
    setTimeout(() => concentrationLines.classList.remove('active'), 600);

    /* Impact text */
    impactText.textContent = impactChar;
    impactText.classList.add('show');
    setTimeout(() => impactText.classList.remove('show'), 1000);

    /* Collision flash on speech bubble edges */
    const currentBubbleClass = speechBubble.className.replace('speech-bubble ', '');
    speechBubble.classList.add('collision-flash');
    setTimeout(() => speechBubble.classList.remove('collision-flash'), 250);

    /* Add collision event to history */
    historyEntries.push({
      speaker: 'collision',
      name: '⚡ 碰撞',
      text: '思想碰撞 — ' + impactChar,
      cssClass: 'nietzsche'
    });
  }

  /* Page flip effect */
  function triggerPageFlip(callback) {
    pageFlip.classList.add('active');
    setTimeout(() => {
      pageFlip.classList.remove('active');
      if (callback) callback();
    }, 300);
  }

  /* Advance the script */
  function advanceScript() {
    if (currentLine >= script.length) {
      currentLine = 0;
    }

    const line = script[currentLine];

    triggerPageFlip(() => {
      if (line.collision) {
        /* Collision event */
        nameTag.style.display = 'none';
        speechBubble.style.display = 'none';
        triggerCollision(line.impact);
        if (chapterLabel) chapterLabel.textContent = line.chapter;
        updateStatus(line.scene);
      } else {
        /* Regular speech */
        nameTag.style.display = 'inline-flex';
        speechBubble.style.display = 'block';

        const cls = speakerClasses[line.speaker];
        /* Update name tag */
        nameTag.className = 'name-tag ' + cls.tag;
        nameTag.textContent = cls.name;

        /* Update speech bubble */
        speechBubble.className = 'speech-bubble ' + cls.bubble;
        speechBubble.innerHTML = line.text;

        /* Show sprite */
        showSprite(line.speaker);

        /* Show scene */
        showScene(line.scene);

        /* Update chapter */
        if (chapterLabel) chapterLabel.textContent = line.chapter;

        /* Update status */
        updateStatus(line.scene);

        /* Add to history */
        historyEntries.push({
          speaker: line.speaker,
          name: cls.name,
          text: line.text,
          cssClass: cls.tag
        });
      }
    });

    currentLine++;
  }

  /* Click/tap handler */
  phoneFrame.addEventListener('click', advanceScript);

  /* Keyboard handler */
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
      e.preventDefault();
      advanceScript();
    }
  });

  /* Initialize — show first line */
  advanceScript();
  currentLine = 0;
  advanceScript();

  /* ============================================
     HISTORY PANEL TOGGLE
     ============================================ */
  function renderHistory() {
    if (historyEntries.length === 0) {
      historyPanel.innerHTML = '<div style="padding:20px;text-align:center;color:rgba(255,255,255,0.2);font-size:12px;">暂无对话记录</div>';
      return;
    }
    historyPanel.innerHTML = historyEntries.map(entry => `
      <div class="history-entry ${entry.cssClass}">
        <div class="h-speaker">${entry.name}</div>
        <div>${entry.text}</div>
      </div>
    `).join('');
    historyPanel.scrollTop = historyPanel.scrollHeight;
  }

  let historyOpen = false;
  historyArrow.addEventListener('click', (e) => {
    e.stopPropagation();
    historyOpen = !historyOpen;
    if (historyOpen) {
      renderHistory();
      historyPanel.classList.add('show');
      historyArrow.textContent = '▴ 收起';
    } else {
      historyPanel.classList.remove('show');
      historyArrow.textContent = '▾ 回顾';
    }
  });

  /* Close history when clicking elsewhere */
  historyPanel.addEventListener('click', (e) => {
    e.stopPropagation();
  });

  phoneFrame.addEventListener('click', (e) => {
    if (historyOpen && !historyPanel.contains(e.target) && e.target !== historyArrow) {
      historyOpen = false;
      historyPanel.classList.remove('show');
      historyArrow.textContent = '▾ 回顾';
    }
  });
})();
</script>

</body>
</html>
