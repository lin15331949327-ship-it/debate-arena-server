<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>思想书简 — 方案 L · 书简对话</title>
<style>
/* ==========================================
   方案 L: 思想书简 (Epistolary UI)
   设计关键词: 手机框 · 书信气泡 · 打字机动画 · 时间戳
   哲学三人: 庄周(竹叶·水墨·太极) / 尼采(火焰·金属·闪电) / 波伏娃(水滴·玻璃·天平)
   目标: 真正的聊天交互体验
   ========================================== */

/* --- CSS Variables --- */
:root {
  --phone-bg: #1a1a1a;
  --phone-screen: #0d1117;
  --bubble-self: #1a3a2a;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --timestamp: #6e7681;
  --typing-dot: #58a6ff;
  --zhuangzi-wood: #4a6e3a;
  --zhuangzi-ink: #1a2e14;
  --zhuangzi-glow: rgba(74,110,58,0.4);
  --zhuangzi-text: #c8d8c0;
  --nietzsche-fire: #d84a1a;
  --nietzsche-metal: #6e6e6e;
  --nietzsche-glow: rgba(216,74,26,0.5);
  --nietzsche-text: #e8c8b8;
  --beauvoir-glass: #5a9ec8;
  --beauvoir-blue: #1a3a5a;
  --beauvoir-glow: rgba(90,158,200,0.4);
  --beauvoir-text: #c8d8e8;
  --font-chat: system-ui, 'SF Pro Text', 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-display: 'Georgia', 'Noto Serif SC', serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 16px; }
body {
  background: #0a0a0a;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: var(--font-chat);
  overflow-x: hidden;
}

/* --- Desk Background --- */
.desk {
  position: fixed; inset: 0;
  background:
    linear-gradient(135deg, #1a1208 0%, #1a1a14 50%, #141a18 100%);
  z-index: 0;
}
.desk::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(200,170,120,0.04), transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(120,150,180,0.03), transparent 50%);
  pointer-events: none;
}
.desk::after {
  content: ''; position: absolute; inset: 0;
  background-image:
    linear-gradient(30deg, transparent 98%, rgba(255,255,255,0.015) 98%),
    linear-gradient(-20deg, transparent 98%, rgba(255,255,255,0.01) 98%);
  background-size: 80px 60px;
  pointer-events: none;
}

/* --- App Container (Full Screen on Mobile) --- */
.app-container {
  position: relative; z-index: 10;
  width: 100vw;
  max-width: 480px;
  height: 100vh;
  height: 100dvh;
  margin: 0 auto;
  background: var(--phone-screen);
  display: flex; flex-direction: column;
  overflow: hidden;
}

@media (min-width: 769px) {
  .app-container {
    margin: 24px auto;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.06);
    height: min(820px, 90vh);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 16px 48px rgba(0,0,0,0.4);
  }
}

/* --- Top Narrow Bar: Status + Avatars --- */
.top-bar {
  display: flex; align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 12px;
  flex-shrink: 0;
  min-height: 50px;
}

.status-indicator {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 8px;
  flex-shrink: 0;
  transition: all 0.3s ease;
}

.status-indicator.debate {
  background: rgba(255,255,255,0.06);
  color: var(--text-secondary);
  border: 1px solid rgba(255,255,255,0.08);
}

.status-indicator.private {
  background: rgba(88,166,255,0.12);
  color: #58a6ff;
  border: 1px solid rgba(88,166,255,0.2);
}

/* Avatar row in top bar */
.top-avatars {
  display: flex; align-items: center;
  gap: 0.3rem;
  margin-left: auto;
}

.top-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  flex-shrink: 0;
}

.top-avatar:hover { transform: scale(1.15); }

.top-avatar.zhuangzi {
  background: linear-gradient(135deg, rgba(74,110,58,0.5), rgba(26,46,20,0.6));
  border: 1px solid rgba(107,142,90,0.25);
  box-shadow: 0 0 8px var(--zhuangzi-glow);
}
.top-avatar.nietzsche {
  background: linear-gradient(135deg, rgba(216,74,26,0.5), rgba(80,30,10,0.6));
  border: 1px solid rgba(216,74,26,0.3);
  box-shadow: 0 0 8px var(--nietzsche-glow);
}
.top-avatar.beauvoir {
  background: linear-gradient(135deg, rgba(90,158,200,0.5), rgba(26,58,90,0.6));
  border: 1px solid rgba(90,158,200,0.25);
  box-shadow: 0 0 8px var(--beauvoir-glow);
}

.top-avatar.selected {
  box-shadow: 0 0 14px rgba(255,255,255,0.3), 0 0 0 2px rgba(255,255,255,0.25);
  transform: scale(1.08);
}

.top-avatar::after {
  content: '';
  position: absolute;
  bottom: -1px; right: -1px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #4ade80;
  border: 1.5px solid var(--phone-screen);
}

/* --- Chat Content --- */
.chat-content {
  flex: 1;
  overflow-y: auto;
  padding: 0.8rem 0.5rem 0.4rem;
  display: flex; flex-direction: column;
  gap: 0.5rem;
  scroll-behavior: smooth;
}
.chat-content::-webkit-scrollbar { width: 3px; }
.chat-content::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
}

/* Date separator */
.date-sep {
  text-align: center;
  margin: 0.6rem 0 0.3rem;
}
.date-sep span {
  display: inline-block;
  padding: 0.25rem 0.8rem;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  font-size: 0.6rem;
  color: var(--timestamp);
  letter-spacing: 0.05em;
}

/* --- Chat Bubbles --- */
.msg-group {
  display: flex; flex-direction: column;
  gap: 2px;
  max-width: 85%;
  animation: msgSlideIn 0.35s ease-out;
}

@media (min-width: 769px) {
  .msg-group { max-width: 60%; }
}
@keyframes msgSlideIn {
  from { opacity:0; transform: translateY(12px); }
  to { opacity:1; transform: translateY(0); }
}
.msg-group.received { align-self: flex-start; }
.msg-group.sent { align-self: flex-end; }

.msg-bubble {
  padding: 0.55rem 0.75rem;
  line-height: 1.6;
  position: relative;
  word-break: break-word;
  font-size: 14px;
}

.msg-group.received .msg-bubble:first-child { border-bottom-left-radius: 4px; }
.msg-group.sent .msg-bubble:first-child { border-bottom-right-radius: 4px; }

/* Zhuangzi bubbles: wood-toned, ink-wash, soft cloud shape */
.msg-bubble.zhuangzi-bubble {
  background: linear-gradient(135deg, rgba(74,110,58,0.22), rgba(26,46,20,0.3));
  border: 1px solid rgba(107,142,90,0.22);
  color: var(--zhuangzi-text);
  border-radius: 6px 16px 16px 14px;
  box-shadow: 0 0 10px var(--zhuangzi-glow), inset 0 0 8px rgba(107,142,90,0.05);
  font-size: 14px;
}

/* Nietzsche bubbles: fire-edged, sharp, metallic */
.msg-bubble.nietzsche-bubble {
  background: linear-gradient(135deg, rgba(216,74,26,0.18), rgba(80,30,10,0.25));
  border: 1px solid rgba(216,74,26,0.28);
  color: var(--nietzsche-text);
  border-radius: 3px 12px 3px 12px;
  box-shadow: 0 0 12px var(--nietzsche-glow), inset 0 0 6px rgba(255,120,40,0.04);
  clip-path: polygon(0% 0%, 96% 0%, 100% 4%, 100% 96%, 96% 100%, 0% 100%, 2% 96%, 2% 4%);
  font-size: 14px;
}

/* Beauvoir bubbles: glassy, cool, rounded */
.msg-bubble.beauvoir-bubble {
  background: linear-gradient(135deg, rgba(90,158,200,0.14), rgba(26,58,90,0.22));
  border: 1px solid rgba(90,158,200,0.22);
  color: var(--beauvoir-text);
  border-radius: 14px;
  box-shadow: 0 0 10px var(--beauvoir-glow), inset 0 0 10px rgba(90,158,200,0.04);
  font-size: 14px;
}

/* Self (user) bubbles */
.msg-bubble.self-bubble {
  background: linear-gradient(135deg, rgba(50,100,200,0.28), rgba(30,60,120,0.35));
  border: 1px solid rgba(80,130,220,0.28);
  color: #c8d8f0;
  border-radius: 16px 16px 4px 16px;
  font-size: 14px;
}

/* --- Typing Cursor (typewriter effect) --- */
.typewriter-cursor::after {
  content: '▍';
  animation: cursorBlink 0.8s step-end infinite;
  opacity: 0.7;
}
@keyframes cursorBlink {
  50% { opacity: 0; }
}

/* --- Message Meta --- */
.msg-meta {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.6rem;
  color: var(--timestamp);
  padding: 0 0.4rem;
  margin-top: 1px;
}
.msg-group.sent .msg-meta { justify-content: flex-end; }
.msg-read { color: #58a6ff; }
.msg-sending { color: var(--text-muted); font-style: italic; }

/* --- Typing Indicator (three dots with per-character style) --- */
.typing-indicator-wrap {
  display: flex; padding: 0 0.8rem 0.3rem;
  min-height: 28px;
}

.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  padding: 0.45rem 0.7rem;
  max-width: fit-content;
  animation: msgSlideIn 0.3s ease-out;
}

.typing-indicator.zhuangzi-typing {
  background: rgba(74,110,58,0.12);
  border: 1px solid rgba(107,142,90,0.15);
  border-radius: 16px 16px 16px 14px;
  color: var(--zhuangzi-text);
  font-size: 13px;
}

.typing-indicator.nietzsche-typing {
  background: rgba(216,74,26,0.12);
  border: 1px solid rgba(216,74,26,0.18);
  border-radius: 12px 12px 4px 12px;
  color: var(--nietzsche-text);
  font-size: 13px;
}

.typing-indicator.beauvoir-typing {
  background: rgba(90,158,200,0.1);
  border: 1px solid rgba(90,158,200,0.15);
  border-radius: 14px;
  color: var(--beauvoir-text);
  font-size: 13px;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  animation: dotBounce 1.4s ease-in-out infinite;
}

.typing-indicator.zhuangzi-typing .typing-dot {
  background: var(--zhuangzi-wood);
}
.typing-indicator.nietzsche-typing .typing-dot {
  background: var(--nietzsche-fire);
}
.typing-indicator.beauvoir-typing .typing-dot {
  background: var(--beauvoir-glass);
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); opacity:0.4; }
  30% { transform: translateY(-5px); opacity:1; }
}

/* Read receipt bar */
.read-receipt {
  text-align: center;
  padding: 0.3rem;
  font-size: 0.55rem;
  color: var(--text-muted);
  opacity: 0;
  transition: opacity 0.8s ease;
}
.read-receipt.visible { opacity: 0.5; }

/* --- Chat Input --- */
.chat-input-area {
  padding: 0.5rem 0.6rem max(0.7rem, env(safe-area-inset-bottom));
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 0.3rem;
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  padding: 0.5rem 0.75rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  color: var(--text-primary);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.3s;
  font-family: inherit;
}
.chat-input:focus { border-color: rgba(255,255,255,0.2); }
.chat-input::placeholder { color: var(--text-muted); }

.chat-send {
  width: 32px; height: 32px;
  border-radius: 50%; border: none;
  background: linear-gradient(135deg, #58a6ff, #3a7ad8);
  color: white;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  flex-shrink: 0;
}
.chat-send:hover { transform: scale(1.05); box-shadow: 0 0 12px rgba(88,166,255,0.4); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* Mode toggle (removed — status now in top bar) */

/* --- Action Buttons (below phone) --- */
.desktop-actions {
  position: relative; z-index: 10;
  display: flex; gap: 1rem;
  margin-top: 1.5rem;
}
.desktop-actions button {
  padding: 0.5rem 1.2rem;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: var(--text-secondary);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.3s;
  font-family: var(--font-display);
  letter-spacing: 0.05em;
  backdrop-filter: blur(4px);
}
.desktop-actions button:hover {
  border-color: rgba(255,255,255,0.3);
  color: var(--text-primary);
  background: rgba(255,255,255,0.08);
}

/* --- Footer --- */
.phone-footer {
  position: relative; z-index: 10;
  margin-top: 1rem;
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--text-muted);
  opacity: 0.4;
  letter-spacing: 0.15em;
  text-align: center;
  display: none;
}

@media (min-width: 769px) {
  .phone-footer { display: block; }
}

/* --- Responsive --- */
@media (max-width: 768px) {
  .app-container {
    width: 100vw;
    max-width: 100vw;
    border-radius: 0;
    border: none;
  }
  .msg-bubble { font-size: 14px; padding: 0.5rem 0.7rem; }
  .desktop-actions { flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
  .chat-input-area { padding: 0.5rem 0.5rem max(0.7rem, env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="desk"></div>

<!-- App Container (Full Screen) -->
<div class="app-container" id="appContainer">

  <!-- Top Bar: Status + Avatars -->
  <div class="top-bar">
    <span class="status-indicator debate" id="statusIndicator">辩论中</span>
    <div class="top-avatars" id="headerAvatars">
      <div class="top-avatar zhuangzi selected" data-char="zhuangzi" title="庄周" onclick="togglePrivateChat('zhuangzi')">🎋</div>
      <div class="top-avatar nietzsche selected" data-char="nietzsche" title="尼采" onclick="togglePrivateChat('nietzsche')">⚡</div>
      <div class="top-avatar beauvoir selected" data-char="beauvoir" title="波伏娃" onclick="togglePrivateChat('beauvoir')">💧</div>
    </div>
  </div>

  <!-- Chat Content -->
  <div class="chat-content" id="chatContent"></div>

  <!-- Typing indicator -->
  <div class="typing-indicator-wrap" id="typingWrap" style="display:none;">
    <div class="typing-indicator" id="typingIndicator">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  </div>

  <!-- Read receipt -->
  <div class="read-receipt" id="readReceipt"></div>

  <!-- Input -->
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput"
           placeholder="参与对话……"
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="chat-send" id="btnSend" onclick="sendMessage()">↑</button>
  </div>
</div>

<!-- Desktop Action Buttons (debate toggle) -->
<div class="desktop-actions" id="desktopActions">
  <button id="btnDebate" onclick="startDebate()">🗣 三人辩论</button>
  <button id="btnTypewriter" onclick="toggleTypewriter()">✍ 打字机效果</button>
  <button id="btnReset" onclick="resetChat()">🔄 清空</button>
</div>

<!-- Footer -->
<div class="phone-footer">点击头像进入1对1私聊 · 按 1/2/3 键切换</div>

<script>
// ======== 思想书简 聊天引擎 ========

// State
const state = {
  mode: 'debate',         // 'debate' | 'private'
  privateChar: null,      // null in debate, 'zhuangzi'|'nietzsche'|'beauvoir' in private
  messages: [],           // {id, sender:'user'|'zhuangzi'|'nietzsche'|'beauvoir', text, time:Date, status:'sending'|'sent'|'read'}
  typewriterEnabled: true,
  isTyping: false,
  debateSeq: 0,
  msgIdCounter: 0,
};

// DOM refs
const chatContent = document.getElementById('chatContent');
const typingWrap = document.getElementById('typingWrap');
const typingIndicator = document.getElementById('typingIndicator');
const readReceipt = document.getElementById('readReceipt');
const chatInput = document.getElementById('chatInput');
const btnSend = document.getElementById('btnSend');
const statusIndicator = document.getElementById('statusIndicator');
const headerAvatars = document.querySelectorAll('.top-avatar');

// Character definitions
const chars = {
  zhuangzi: {
    name: '庄子', emoji: '🎋', subtitle: 'DAO · 逍遥游',
    bubbleClass: 'zhuangzi-bubble', typingClass: 'zhuangzi-typing',
    color: '#4a6e3a'
  },
  nietzsche: {
    name: '尼采', emoji: '⚡', subtitle: 'ÜBERMENSCH · 权力意志',
    bubbleClass: 'nietzsche-bubble', typingClass: 'nietzsche-typing',
    color: '#d84a1a'
  },
  beauvoir: {
    name: '波伏娃', emoji: '💧', subtitle: 'EXISTENCE · 第二性',
    bubbleClass: 'beauvoir-bubble', typingClass: 'beauvoir-typing',
    color: '#5a9ec8'
  }
};

// Debate script (initial demo messages)
const debateScript = [
  { sender: 'zhuangzi', text: '北冥有鱼，其名为鲲。鲲之大，不知其几千里也。化而为鸟，其名为鹏。鹏之背，不知其几千里也；怒而飞，其翼若垂天之云。' },
  { sender: 'nietzsche', text: '人是一根系在动物与超人之间的绳索——一根悬在深渊之上的绳索。人的伟大之处在于，他是一座桥梁而非目的；人的可爱之处在于，他是一种过渡与一种毁灭。' },
  { sender: 'beauvoir', text: '女人不是天生的，而是后天成为的。任何生理、心理或经济命运都不能决定女性在社会中所呈现的形象。是整个文明塑造了这一介于男性与被阉者之间的、被称为女性的中间产物。' },
];

// Auto-reply templates (simulates DeepSeek API)
const autoReplies = {
  zhuangzi: [
    '善哉斯问！然汝之所思，仍在"有"中打转。吾尝言：至人无己，神人无功，圣人无名。汝之问，犹鹏之待风也——风积不厚，则其负大翼也无力。',
    '汝心有所系，故有所惑。泉涸，鱼相与处于陆，相呴以湿，相濡以沫——不如相忘于江湖。与其执着于此问，不如放下，与天地精神往来。',
    '吾梦为蝴蝶，栩栩然蝴蝶也……不知周之梦为蝴蝶与？蝴蝶之梦为周与？汝之所问，亦如是：执于一边，则失其全。物化者，与道俱化。',
    '天地与我并生，而万物与我为一。既已为一矣，且得有言乎？既已谓之一矣，且得无言乎？汝之疑，即道之动也。',
  ],
  nietzsche: [
    '哈！又是一个好问题——像锤子敲在旧石板上！但你仍然在用"人的、太人的"尺度思考。超人不在乎这样的问题——他创造自己的回答！',
    '你感到困惑？很好！困惑是觉醒的前夜。所有的伟大都始于对旧价值的怀疑。我告诉你：上帝已死——现在轮到你来成为神了！',
    '你的问题中藏着怯懦。你希望有人给你答案——但答案不是被给予的，是被夺取的！用锤子敲碎这个问题本身，在废墟上建造你自己的真理。',
    '永恒的轮回！如果这个问题将无限次地回到你面前——你会诅咒它，还是会爱它？爱你的命运吧，这才是真正的自由！',
  ],
  beauvoir: [
    '这是一个深刻的问题。但我必须追问：是谁在问？在什么样的处境中问？抽象的哲学必须回到具体的生命——否则不过是在云端建造宫殿。',
    '我欣赏你的思考，但请允许我加一层维度：性别、阶级、历史——这些不是哲学的外衣，而是哲学的血肉。你的问题在什么样的身体和经验中产生？',
    '自由从来不是一个人孤独的事业。你提出的问题，隐含着对他者的关切——这正是我想强调的：我的自由以他者的自由为前提。',
    '存在先于本质。这意味着你的问题本身就在塑造你。不要等待一个终极答案——在行动中、在关系中、在持续的"成为"中，答案会自己显现。',
  ]
};

// Time formatting
const timeFmt = new Intl.DateTimeFormat('zh-CN', { hour: '2-digit', minute: '2-digit' });

function formatTime(date) {
  const now = new Date();
  const diff = now - date;
  if (diff < 60000) return '刚刚';
  if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
  return timeFmt.format(date);
}

function getDateLabel(date) {
  const now = new Date();
  const d = new Date(date);
  if (d.toDateString() === now.toDateString()) return '今天';
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return '昨天';
  return d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
}

// ======== RENDER ========
let lastRenderedDate = null;

function renderMessages() {
  const visible = state.mode === 'debate'
    ? state.messages
    : state.messages.filter(m => m.sender === 'user' || m.sender === state.privateChar);

  let html = '';
  lastRenderedDate = null;

  visible.forEach(msg => {
    const msgDate = getDateLabel(msg.time);
    if (msgDate !== lastRenderedDate) {
      html += `<div class="date-sep"><span>${msgDate}</span></div>`;
      lastRenderedDate = msgDate;
    }

    const isUser = msg.sender === 'user';
    const bubbleClass = isUser ? 'self-bubble' : (chars[msg.sender]?.bubbleClass || '');
    const align = isUser ? 'sent' : 'received';
    const timeStr = formatTime(msg.time);
    const statusHtml = isUser
      ? (msg.status === 'sending' ? '<span class="msg-sending">发送中...</span>'
        : msg.status === 'sent' ? '<span class="msg-read">✓</span>'
        : '<span class="msg-read">✓✓ 已读</span>')
      : '已读';

    html += `
      <div class="msg-group ${align}" data-msg-id="${msg.id}">
        <div class="msg-bubble ${bubbleClass}">${msg.text}</div>
        <div class="msg-meta">${timeStr} · ${statusHtml}</div>
      </div>`;
  });

  chatContent.innerHTML = html;
  chatContent.scrollTop = chatContent.scrollHeight;
}

// ======== ADD MESSAGE ========
function addMessage(sender, text, status = 'sent') {
  const msg = {
    id: ++state.msgIdCounter,
    sender,
    text,
    time: new Date(),
    status
  };
  state.messages.push(msg);
  renderMessages();
  return msg;
}

// ======== TYPING INDICATOR ========
function showTyping(char) {
  typingIndicator.className = 'typing-indicator ' + (chars[char]?.typingClass || 'zhuangzi-typing');
  typingIndicator.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  typingWrap.style.display = 'flex';
}

function hideTyping() {
  typingWrap.style.display = 'none';
}

// ======== TYPEWRITER EFFECT ========
function typewriterEffect(bubbleEl, text, char, speed = 35) {
  return new Promise(resolve => {
    if (!state.typewriterEnabled) {
      bubbleEl.textContent = text;
      resolve();
      return;
    }
    let i = 0;
    bubbleEl.classList.add('typewriter-cursor');
    function type() {
      if (i < text.length) {
        bubbleEl.textContent = text.substring(0, i + 1);
        i++;
        const delay = '。！？，、；：'.includes(text[i - 1]) ? speed * 3 : speed;
        setTimeout(type, delay);
      } else {
        bubbleEl.classList.remove('typewriter-cursor');
        resolve();
      }
    }
    type();
  });
}

// ======== ADD MESSAGE WITH ANIMATION ========
async function addMessageAnimated(sender, text, animate = true) {
  const msg = {
    id: ++state.msgIdCounter,
    sender,
    text,
    time: new Date(),
    status: 'sent'
  };
  state.messages.push(msg);
  renderMessages();

  if (animate && state.typewriterEnabled && sender !== 'user') {
    // Find the bubble we just rendered
    const bubble = chatContent.querySelector(`[data-msg-id="${msg.id}"] .msg-bubble`);
    if (bubble) {
      bubble.textContent = '';
      await typewriterEffect(bubble, text, sender);
      msg.text = text; // already set
    }
  }

  return msg;
}

// ======== READ RECEIPT ========
function showReadReceipt(senders) {
  const names = senders.map(s => chars[s]?.name).filter(Boolean).join('、');
  readReceipt.textContent = `${names} 已读`;
  readReceipt.classList.add('visible');
  setTimeout(() => readReceipt.classList.remove('visible'), 3000);
}

// ======== SEND MESSAGE (user) ========
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || state.isTyping) return;
  chatInput.value = '';
  btnSend.disabled = true;

  // Add user message as "sending"
  const userMsg = addMessage('user', text, 'sending');

  // Simulate send delay → "sent"
  await delay(400 + Math.random() * 400);
  userMsg.status = 'sent';
  renderMessages();

  if (state.mode === 'debate') {
    // All 3 philosophers reply in sequence
    await debateReplies(text);
  } else {
    // Private chat: only the selected philosopher replies
    await privateReply(state.privateChar, text);
  }

  btnSend.disabled = false;
  chatInput.focus();
}

// ======== DEBATE MODE: sequential replies ========
async function debateReplies(userText) {
  state.isTyping = true;
  const participants = ['zhuangzi', 'nietzsche', 'beauvoir'];

  for (const p of participants) {
    showTyping(p);
    await delay(800 + Math.random() * 1200);

    const replies = autoReplies[p];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    hideTyping();

    await addMessageAnimated(p, reply, true);
    await delay(500 + Math.random() * 600);
  }

  // Mark all as read
  participants.forEach(p => {
    const msgs = state.messages.filter(m => m.sender === 'user');
    msgs.forEach(m => { m.status = 'read'; });
  });
  renderMessages();

  showReadReceipt(participants);
  state.isTyping = false;
}

// ======== PRIVATE MODE: single philosopher replies ========
async function privateReply(char, userText) {
  state.isTyping = true;

  showTyping(char);
  await delay(1000 + Math.random() * 1500);

  const replies = autoReplies[char];
  const reply = replies[Math.floor(Math.random() * replies.length)];
  hideTyping();

  await addMessageAnimated(char, reply, true);

  // Mark user msg as read
  state.messages.filter(m => m.sender === 'user').forEach(m => { m.status = 'read'; });
  renderMessages();

  showReadReceipt([char]);
  state.isTyping = false;
}

// ======== START DEBATE (pre-scripted demo) ========
async function startDebate() {
  if (state.isTyping) return;
  state.mode = 'debate';
  state.privateChar = null;
  updateUI();

  // Add today's date label
  addMessage('system', '', 'sent'); // will be filtered, just triggers date
  state.messages.pop(); // remove the dummy

  // Add debate messages sequentially
  for (const line of debateScript) {
    showTyping(line.sender);
    await delay(600 + Math.random() * 800);

    hideTyping();
    await addMessageAnimated(line.sender, line.text, true);
    await delay(400 + Math.random() * 600);
  }

  showReadReceipt(['zhuangzi', 'nietzsche', 'beauvoir']);
  chatInput.placeholder = '参与三人辩论……';
}

// ======== TOGGLE PRIVATE CHAT ========
function togglePrivateChat(char) {
  if (state.isTyping) return;

  if (state.mode === 'private' && state.privateChar === char) {
    // Return to debate
    state.mode = 'debate';
    state.privateChar = null;
  } else {
    state.mode = 'private';
    state.privateChar = char;
  }

  updateUI();
  renderMessages();
}

// ======== UPDATE UI (mode/avatars/status) ========
function updateUI() {
  if (state.mode === 'debate') {
    statusIndicator.textContent = '辩论中';
    statusIndicator.className = 'status-indicator debate';
    chatInput.placeholder = '参与三人辩论……';
    headerAvatars.forEach(a => {
      a.classList.add('selected');
    });
  } else {
    const c = chars[state.privateChar];
    statusIndicator.textContent = '私聊·' + c.name;
    statusIndicator.className = 'status-indicator private';
    chatInput.placeholder = `与${c.name}对话……`;
    headerAvatars.forEach(a => {
      if (a.dataset.char === state.privateChar) {
        a.classList.add('selected');
      } else {
        a.classList.remove('selected');
      }
    });
  }
}

// ======== RETURN TO LIST (not needed, removed) ========
function returnToList() {
  // no-op: back button removed in mobile layout
}

// ======== TOGGLE TYPEWRITER ========
function toggleTypewriter() {
  state.typewriterEnabled = !state.typewriterEnabled;
  const btn = document.getElementById('btnTypewriter');
  btn.textContent = state.typewriterEnabled ? '✍ 打字机效果: 开' : '✍ 打字机效果: 关';
}

// ======== RESET ========
function resetChat() {
  state.messages = [];
  state.debateSeq = 0;
  state.msgIdCounter = 0;
  state.mode = 'debate';
  state.privateChar = null;
  lastRenderedDate = null;
  updateUI();
  renderMessages();
}

// ======== UTILITY ========
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ======== CLOCK (moved to top bar status) ========
// Clock integrated into status indicator

// ======== KEYBOARD SHORTCUTS ========
// Enable click-to-toggle on avatars (tap to enter, tap again to exit)
headerAvatars.forEach(avatar => {
  avatar.addEventListener('click', (e) => {
    const char = avatar.dataset.char;
    togglePrivateChat(char);
    e.stopPropagation();
  });
});

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || document.activeElement === chatInput) return;
  switch (e.key) {
    case '1': togglePrivateChat('zhuangzi'); break;
    case '2': togglePrivateChat('nietzsche'); break;
    case '3': togglePrivateChat('beauvoir'); break;
    case 'd': startDebate(); break;
    case 't': toggleTypewriter(); break;
    case 'Escape': resetChat(); break;
  }
});

// ======== INIT ========
updateUI();
startDebate();
</script>
