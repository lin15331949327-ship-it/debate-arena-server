<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>次元·绘卷 �?PWA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Noto+Sans+SC:wght@200;300;400;500&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest-anime-vn.json">
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
/* ══════════════════════════════════════�?
   次元·绘卷 Anime VN �?PWA 打磨�?v2
   水晶6�?· 侧影呼吸 · 粒子炸开 · 快进 · 追问 · 质量报告
   ══════════════════════════════════════�?*/

:root {
  --bg-night: #0a0a14;
  --dialog-bg: rgba(10,10,24,0.92);

  /* 庄周 �?逍遥�?*/
  --zhuangzi: #4a8a3f;
  --zhuangzi-light: #6ab85f;
  --zhuangzi-glow: rgba(74,138,63,0.35);
  --zhuangzi-bubble: linear-gradient(170deg, rgba(30,60,25,0.55) 0%, rgba(20,45,18,0.65) 100%);
  --zhuangzi-border: rgba(74,138,63,0.3);
  --zhuangzi-shadow: rgba(45,90,39,0.2);
  --zhuangzi-tag: linear-gradient(135deg, rgba(45,90,39,0.55), rgba(45,90,39,0.35));
  --zhuangzi-tag-text: #a0d8a0;

  /* 尼采 �?意志�?*/
  --nietzsche: #d43535;
  --nietzsche-light: #f05050;
  --nietzsche-glow: rgba(212,53,53,0.35);
  --nietzsche-bubble: linear-gradient(175deg, rgba(55,18,18,0.65) 0%, rgba(40,12,12,0.75) 100%);
  --nietzsche-border: rgba(212,53,53,0.45);
  --nietzsche-shadow: rgba(212,53,53,0.15);
  --nietzsche-tag: linear-gradient(135deg, rgba(180,40,40,0.55), rgba(180,40,40,0.35));
  --nietzsche-tag-text: #ffb0b0;

  /* 波伏�?�?存在�?*/
  --beauvoir: #2563eb;
  --beauvoir-light: #5080f0;
  --beauvoir-glow: rgba(37,99,235,0.3);
  --beauvoir-bubble: linear-gradient(175deg, rgba(18,25,50,0.6) 0%, rgba(12,20,42,0.7) 100%);
  --beauvoir-border: rgba(37,99,235,0.3);
  --beauvoir-shadow: rgba(37,99,235,0.15);
  --beauvoir-tag: linear-gradient(135deg, rgba(30,70,180,0.55), rgba(30,70,180,0.35));
  --beauvoir-tag-text: #a0c0ff;

  --text-light: #f0e8e8;
  --text-dim: rgba(240,232,232,0.7);
  --text-muted: rgba(240,232,232,0.35);
  --title-font: 'Ma Shan Zheng', 'Noto Sans SC', serif;
  --body-font: 'Noto Sans SC', 'Inter', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:var(--body-font);
  background:#050510;
  color:var(--text-light);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ══�?App 框架 ══�?*/
.app-frame{
  position:relative;
  width:min(390px,100vw);
  height:min(844px,100vh);
  background:var(--bg-night);
  overflow:hidden;
  border-radius:12px;
  box-shadow:
    0 0 0 2px rgba(255,255,255,.04),
    0 20px 60px rgba(0,0,0,.55),
    0 0 120px rgba(37,99,235,.06);
  transition: filter 1.2s ease;
}
.app-frame.dimmed-for-report{ filter:brightness(0.4) blur(2px); }

@media(max-width:420px){
  .app-frame{ border-radius:0; width:100vw; height:100vh; }
}

/* ══�?场景�?(60%) ══�?*/
.scene-area{
  position:relative;
  width:100%;
  height:60%;
  overflow:hidden;
  background:linear-gradient(180deg,
    #0d0d20 0%,
    #111630 25%,
    #0f2440 55%,
    #111630 100%);
  transition: filter 0.8s ease;
}

/* 网点覆盖 */
.screen-tone-overlay{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:6px 6px;
  opacity:.5;
  pointer-events:none;
  z-index:2;
}

/* ── 星空 ── */
.stars{ position:absolute;inset:0;pointer-events:none;z-index:1; }
.star{
  position:absolute;
  width:1.5px;height:1.5px;
  background:white;
  border-radius:50%;
  animation:twinkle 3s ease-in-out infinite;
  transition: all 0.3s ease;
}
.star.burst{ background:#ffe8a0; box-shadow:0 0 6px #ffe8a0; transform:scale(2.5); }
.star:nth-child(1){top:8%;left:12%}.star:nth-child(2){top:15%;left:30%;animation-delay:.7s}
.star:nth-child(3){top:22%;left:55%;animation-delay:1.4s}.star:nth-child(4){top:12%;left:75%;animation-delay:2.1s}
.star:nth-child(5){top:30%;left:18%;animation-delay:.3s}.star:nth-child(6){top:25%;left:65%;animation-delay:1.1s}
.star:nth-child(7){top:35%;left:42%}.star:nth-child(8){top:18%;left:88%;animation-delay:1.8s}
.star:nth-child(9){top:42%;left:8%;animation-delay:2.4s}.star:nth-child(10){top:8%;left:50%;animation-delay:.5s}
@keyframes twinkle{ 0%,100%{opacity:.25} 50%{opacity:1} }

/* ── 花瓣粒子 ── */
.petals{ position:absolute;inset:0;pointer-events:none;z-index:3; }
.petal{
  position:absolute;
  width:10px;height:6px;
  background:rgba(255,180,180,.35);
  border-radius:0 100% 0 100%;
  animation:petalFall linear infinite;
  transition: all 1.5s ease-out;
}
.petal:nth-child(1){left:15%;animation-duration:18s}
.petal:nth-child(2){left:35%;animation-duration:20s;animation-delay:3s}
.petal:nth-child(3){left:55%;animation-duration:16s;animation-delay:6s}
.petal:nth-child(4){left:75%;animation-duration:19s;animation-delay:2s}
.petal:nth-child(5){left:10%;animation-duration:17s;animation-delay:8s}
.petal:nth-child(6){left:60%;animation-duration:21s;animation-delay:5s}
@keyframes petalFall{
  0%{top:-5%;opacity:0;transform:rotate(0deg) translateX(0)}
  10%{opacity:.5}
  90%{opacity:.35}
  100%{top:105%;opacity:0;transform:rotate(360deg) translateX(30px)}
}

/* ── 角色侧影 (5.2 新增) ── */
.silhouettes{ position:absolute;inset:0;pointer-events:none;z-index:4; }
.silhouette{
  position:absolute;
  bottom:10%;
  width:64px;height:120px;
  opacity:0.08;
  transition: opacity 1.2s ease, filter 1.2s ease;
  border-radius:40% 40% 0 0;
}
.silhouette::before{
  content:'';
  position:absolute;
  top:-20px;left:50%;transform:translateX(-50%);
  width:28px;height:28px;
  border-radius:50%;
  background:inherit;
}
.silhouette::after{
  content:'';
  position:absolute;
  bottom:16px;left:10%;right:10%;
  height:3px;
  background:inherit;
  opacity:0.4;
  border-radius:2px;
}
.silhouette.zhuangzi{
  left:10%;
  background:linear-gradient(180deg,var(--zhuangzi-glow),rgba(74,138,63,0.08));
}
.silhouette.nietzsche{
  left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--nietzsche-glow),rgba(212,53,53,0.08));
}
.silhouette.beauvoir{
  right:10%;
  background:linear-gradient(180deg,var(--beauvoir-glow),rgba(37,99,235,0.08));
}
.silhouette.thinking{
  opacity:0.45;
  filter:blur(3px);
  animation:breathe 3s ease-in-out infinite;
}
.silhouette.zhuangzi.thinking{ box-shadow:0 0 40px var(--zhuangzi-glow),0 0 80px rgba(74,138,63,0.15); }
.silhouette.nietzsche.thinking{ box-shadow:0 0 40px var(--nietzsche-glow),0 0 80px rgba(212,53,53,0.15); }
.silhouette.beauvoir.thinking{ box-shadow:0 0 40px var(--beauvoir-glow),0 0 80px rgba(37,99,235,0.15); }
@keyframes breathe{
  0%,100%{ filter:blur(3px) brightness(1); }
  50%{ filter:blur(1px) brightness(1.4); }
}

/* ── 集中�?── */
.concentration-lines{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  opacity:0;transition:opacity .4s ease;
  background:repeating-conic-gradient(
    rgba(255,255,255,.03) 0% .3%,
    transparent .3% 1.2%
  ) 50% 50% / 200px 200px;
}
.concentration-lines.active{ opacity:.45; }

/* ── 速度�?── */
.speed-lines{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  opacity:0;transition:opacity .25s ease;
}
.speed-lines::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    90deg,transparent,transparent 8px,
    rgba(255,255,255,.1) 8px,rgba(255,255,255,.1) 9px
  );
  mask-image:radial-gradient(ellipse 40% 50% at center,black 0%,transparent 70%);
}
.speed-lines.active{ opacity:.5; }

/* ── 冲击文字 ── */
.impact-text{
  position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);
  font-family:var(--title-font);
  font-size:48px;font-weight:800;
  color:rgba(255,255,255,.1);
  text-shadow:0 0 20px rgba(255,255,255,.08),0 0 40px rgba(255,200,100,.12);
  pointer-events:none;z-index:6;
  opacity:0;transition:opacity .2s ease;
}
.impact-text.show{
  opacity:1;
  animation:impactPop .8s cubic-bezier(.36,0,.66,-.56);
}
@keyframes impactPop{
  0%{transform:translate(-50%,-50%) scale(.3);opacity:0}
  40%{transform:translate(-50%,-50%) scale(1.5);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:.6}
}

/* ══�?对话�?(40%) ══�?*/
.dialog-area{
  position:absolute;bottom:0;left:0;right:0;
  height:40%;
  background:linear-gradient(180deg,
    rgba(10,10,22,.2) 0%,
    rgba(10,10,22,.82) 12%,
    rgba(8,8,18,.95) 100%);
  display:flex;flex-direction:column;
  padding:16px 18px 20px;
  transition: opacity 0.6s ease;
}

/* ── 追问�?(5.5 新增) ── */
.question-row{
  display:flex;gap:8px;
  margin-bottom:10px;
  opacity:0;transform:translateY(-8px);
  transition: all 0.5s cubic-bezier(0.25,0.1,0.25,1);
  pointer-events:none;
}
.question-row.visible{
  opacity:1;transform:translateY(0);
  pointer-events:auto;
}
.question-row input{
  flex:1;
  padding:8px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(10,10,30,.55);
  backdrop-filter:blur(12px);
  color:var(--text-light);
  font-size:13px;
  font-family:var(--body-font);
  outline:none;
  transition: border-color .3s;
}
.question-row input:focus{
  border-color:rgba(255,255,255,.2);
  background:rgba(15,15,35,.65);
}
.question-row input::placeholder{ color:rgba(255,255,255,.25); }
.question-row button{
  width:38px;height:38px;
  border-radius:50%;border:none;
  background:rgba(255,255,255,.08);
  color:var(--text-dim);
  font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition: all .25s;
  flex-shrink:0;
}
.question-row button:hover{
  background:rgba(255,255,255,.16);
  color:var(--text-light);
}

/* ── 名字标签 ── */
.name-tag{
  display:inline-flex;align-items:center;gap:6px;
  margin-bottom:10px;
  padding:5px 16px;border-radius:4px;
  font-family:var(--title-font);
  font-size:14px;font-weight:700;letter-spacing:2px;
  width:fit-content;
  transition: all .3s ease;
}
.name-tag.zhuangzi{
  background:var(--zhuangzi-tag);
  color:var(--zhuangzi-tag-text);
  border-left:3px solid var(--zhuangzi-light);
}
.name-tag.nietzsche{
  background:var(--nietzsche-tag);
  color:var(--nietzsche-tag-text);
  border-left:3px solid var(--nietzsche-light);
}
.name-tag.beauvoir{
  background:var(--beauvoir-tag);
  color:var(--beauvoir-tag-text);
  border-left:3px solid var(--beauvoir-light);
}
.name-tag.system{
  background:rgba(255,255,255,.06);
  color:var(--text-dim);
  border-left:3px solid rgba(255,255,255,.15);
}

/* ── 对话气泡 ── */
.speech-bubble{
  flex:1;
  padding:14px 16px;border-radius:8px;
  font-size:14px;line-height:1.9;letter-spacing:.5px;
  position:relative;transition:all .35s ease;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.bubble-zhuangzi{
  background:var(--zhuangzi-bubble);
  border-radius:6px 18px 18px 12px;
  border:.5px solid var(--zhuangzi-border);
  box-shadow:0 2px 12px var(--zhuangzi-shadow);
}
.bubble-nietzsche{
  background:var(--nietzsche-bubble);
  border-radius:2px 10px 2px 10px;
  border-top:2px solid var(--nietzsche);
  border-bottom:2px solid rgba(212,53,53,.35);
  box-shadow:0 2px 12px var(--nietzsche-shadow);
  clip-path:polygon(0% 0%,95% 0%,100% 3%,100% 97%,95% 100%,0% 100%,2% 97%,2% 3%);
}
.bubble-beauvoir{
  background:var(--beauvoir-bubble);
  border-radius:12px;
  border:.5px solid var(--beauvoir-border);
  box-shadow:0 2px 12px var(--beauvoir-shadow);
}
.bubble-system{
  background:rgba(255,255,255,.04);
  border-radius:8px;
  border:.5px solid rgba(255,255,255,.06);
  text-align:center;
  color:var(--text-dim);
  font-size:12px;
  font-style:italic;
}

/* ── 碰撞闪烁 ── */
.speech-bubble.collision-flash{
  animation:collisionFlash .25s ease-out;
}
@keyframes collisionFlash{
  0%{box-shadow:0 0 0 rgba(255,255,255,0)}
  30%{box-shadow:0 0 24px rgba(255,255,255,.2),0 0 48px rgba(255,180,80,.25)}
  100%{box-shadow:0 2px 12px rgba(45,90,39,.15)}
}

/* ── 迷你进度�?(5.4 时间轴替�? ── */
.script-progress{
  display:flex;gap:4px;
  margin-top:8px;
  opacity:0;transition:opacity .4s;
}
.script-progress.visible{ opacity:1; }
.script-progress .seg{
  flex:1;height:3px;border-radius:2px;
  background:rgba(255,255,255,.06);
  transition:all .5s ease;
}
.script-progress .seg.done.zhuangzi{ background:var(--zhuangzi-light); box-shadow:0 0 6px var(--zhuangzi-glow); }
.script-progress .seg.done.nietzsche{ background:var(--nietzsche-light); box-shadow:0 0 6px var(--nietzsche-glow); }
.script-progress .seg.done.beauvoir{ background:var(--beauvoir-light); box-shadow:0 0 6px var(--beauvoir-glow); }
.script-progress .seg.current{
  background:rgba(255,255,255,.5);
  animation:segPulse 1.2s ease-in-out infinite;
}
@keyframes segPulse{ 0%,100%{opacity:.5} 50%{opacity:1} }

/* ══�?状态栏 (顶部) ══�?*/
.status-bar{
  position:absolute;top:0;left:0;right:0;z-index:20;
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(10,10,20,.7) 0%,transparent 100%);
}
.status-chapter{
  font-family:var(--title-font);
  font-size:12px;font-weight:500;letter-spacing:3px;
  color:var(--text-muted);
  transition:color .5s;
}

/* ── 水晶�?(5.1 重构: 6�? ── */
.crystal-row{
  display:flex;gap:5px;align-items:center;
}
.crystal{
  position:relative;
  width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  cursor:default;
  transition:all .5s ease;
}
.crystal .crystal-shape{
  position:absolute;inset:0;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  transition:all .5s ease;
}
.crystal .crystal-num{
  position:relative;z-index:2;
  font-family:var(--title-font);
  font-size:11px;
  color:rgba(255,255,255,.25);
  transition:all .5s ease;
  pointer-events:none;
  line-height:1;
}

/* 庄周水晶: r1 & r4 */
.crystal[data-agent="zhuangzi"] .crystal-shape{
  background:rgba(74,138,63,.06);
  border-color:rgba(74,138,63,.12);
}
.crystal[data-agent="zhuangzi"].done .crystal-shape{
  background:rgba(74,138,63,.4);
  border-color:rgba(74,138,63,.7);
  box-shadow:0 0 12px var(--zhuangzi-glow),0 0 24px rgba(74,138,63,.12);
}
.crystal[data-agent="zhuangzi"].done .crystal-num{ color:#c8e8c0; text-shadow:0 0 6px rgba(74,138,63,.5); }

/* 尼采水晶: r2 & r5 */
.crystal[data-agent="nietzsche"] .crystal-shape{
  background:rgba(212,53,53,.06);
  border-color:rgba(212,53,53,.12);
}
.crystal[data-agent="nietzsche"].done .crystal-shape{
  background:rgba(212,53,53,.4);
  border-color:rgba(212,53,53,.7);
  box-shadow:0 0 12px var(--nietzsche-glow),0 0 24px rgba(212,53,53,.12);
}
.crystal[data-agent="nietzsche"].done .crystal-num{ color:#ffd0d0; text-shadow:0 0 6px rgba(212,53,53,.5); }

/* 波伏娃水�? r3 & r6 */
.crystal[data-agent="beauvoir"] .crystal-shape{
  background:rgba(37,99,235,.06);
  border-color:rgba(37,99,235,.12);
}
.crystal[data-agent="beauvoir"].done .crystal-shape{
  background:rgba(37,99,235,.4);
  border-color:rgba(37,99,235,.7);
  box-shadow:0 0 12px var(--beauvoir-glow),0 0 24px rgba(37,99,235,.12);
}
.crystal[data-agent="beauvoir"].done .crystal-num{ color:#d0e0ff; text-shadow:0 0 6px rgba(37,99,235,.5); }

/* 当前水晶脉冲 */
.crystal.current .crystal-shape{
  animation:crystalPulse 1.8s ease-in-out infinite;
}
@keyframes crystalPulse{
  0%,100%{ transform:scale(1); filter:brightness(1); }
  50%{ transform:scale(1.15); filter:brightness(1.5); }
}

/* ══�?话题�?══�?*/
.topic-bar{
  position:absolute;top:44px;left:0;right:0;z-index:25;
  display:flex;gap:6px;padding:0 14px;
}
.topic-bar input{
  flex:1;
  padding:7px 14px;border-radius:18px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.45);
  color:var(--text-light);
  font-size:12px;font-family:var(--body-font);
  outline:none;
}
.topic-bar input:focus{ border-color:rgba(255,255,255,.2); }
.topic-bar .btn-start{
  padding:7px 16px;border-radius:18px;border:none;
  background:rgba(212,53,53,.55);
  color:#fff;font-size:12px;cursor:pointer;
  white-space:nowrap;font-family:var(--title-font);
  letter-spacing:1px;
  transition:all .3s;
}
.topic-bar .btn-start:hover{ background:rgba(230,60,60,.65); transform:scale(1.04); }
.topic-bar .btn-start:disabled{ opacity:.35;cursor:not-allowed;transform:none; }

/* ── 快进按钮 (5.4) ── */
.btn-fast-forward{
  padding:7px 10px;border-radius:18px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.04);
  color:var(--text-dim);font-size:11px;cursor:pointer;
  white-space:nowrap;font-family:var(--body-font);
  transition:all .3s;
  display:none;
}
.btn-fast-forward.visible{ display:block; }
.btn-fast-forward:hover{ background:rgba(255,255,255,.1);color:var(--text-light); }

/* ══�?导航提示 ══�?*/
.nav-hint{
  position:absolute;bottom:10px;right:16px;z-index:20;
  font-size:10px;color:var(--text-muted);
  letter-spacing:2px;
  animation:hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse{ 0%,100%{opacity:.25} 50%{opacity:.6} }

/* ══�?Typing 指示�?(批量确认2.1) ══�?*/
.typing-indicator{
  display:none;
  align-items:center;gap:6px;
  position:absolute;top:58%;left:50%;transform:translateX(-50%);
  z-index:8;pointer-events:none;
  color:var(--text-dim);font-size:12px;
  background:rgba(0,0,0,.35);
  padding:6px 14px;border-radius:14px;
  letter-spacing:1px;
}

}

/* ══�?错误横幅 (批量确认2.3) ══�?*/
.error-banner{
  display:none;

.report-overlay{

/* ══�?追问气泡 (对话区显示用户追�? ══�?*/
.user-question-bubble{
  text-align:right;
  padding:8px 14px;margin:4px 0;

@keyframes cardAppear{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ══�?响应�?══�?*/
@media(max-width:420px){
  .speech-bubble{ font-size:13px;line-height:1.75;padding:12px 14px; }

<script src="socket.io.min.js"></script>
<script>
/* ══════════════════════════════════════════�?
   次元·绘卷 �?JS 完整逻辑
   模板化配�?· 水晶管理 · 手动推进
   侧影呼吸 · 粒子炸开 · 追问 · 报告
   ══════════════════════════════════════════�?*/

// ─── Config 模板化出�?────────────────────────
const CONFIG = {
  socketURL: 'https://debate-arena-server-production.up.railway.app',
  maxRounds: 6,
  agents: [
    { id: 'zhuangzi', name: '庄周', chapter: '逍遥�?, color: '#4a8a3f' },
    { id: 'nietzsche', name: '尼采', chapter: '权力意志', color: '#d43535' },
    { id: 'beauvoir', name: '波伏�?, chapter: '第二�?, color: '#2563eb' },
  ],
  // 轮次 �?agent 映射 (0-indexed round �?agent index)
  roundAgent: (r) => CONFIG.agents[r % 3],
};

// ─── Service Worker ──────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// ─── Socket ──────────────────────────────────
const socket = io(CONFIG.socketURL);
socket.on('connect', () => { console.log('🟢 已连接辩论服务器'); });
socket.on('connect_error', () => {
  console.warn('⚠️ 辩论服务器不可用');
  alert('⚠️ 无法连接辩论服务器，请稍后重试或检查网络。');
  document.getElementById('btnStart').disabled = false;
});
socket.on('disconnect', (reason) => { console.warn('⚠️ 与服务器断开:', reason); });

// ─── DOM 引用 ────────────────────────────────
const $ = (id) => document.getElementById(id);
const speechBubble = $('speechBubble');
const nameTag = $('nameTag');
const impactText = $('impactText');
const concentrationLines = $('concentrationLines');
const speedLines = $('speedLines');
const chapterLabel = $('chapterLabel');
const crystalRow = $('crystalRow');
const typingIndicator = $('typingIndicator');
const typingText = $('typingText');
const errorBanner = $('errorBanner');
const questionRow = $('questionRow');
const scriptProgress = $('scriptProgress');
const reportOverlay = $('reportOverlay');
const btnFastForward = $('btnFastForward');
const navHint = $('navHint');
const appFrame = $('app');
const sceneArea = $('sceneArea');

// ─── 发言人配�?──────────────────────────────
const speakerConfig = {
  zhuangzi: {
    bubble: 'bubble-zhuangzi', tag: 'zhuangzi', name: '庄周',
    chapter: '逍遥�?, emoji: '🦋',
  },
  nietzsche: {
    bubble: 'bubble-nietzsche', tag: 'nietzsche', name: '尼采',
    chapter: '权力意志', emoji: '�?,
  },
  beauvoir: {
    bubble: 'bubble-beauvoir', tag: 'beauvoir', name: '波伏�?,
    chapter: '第二�?, emoji: '👁�?,
  },
  system: {
    bubble: 'bubble-system', tag: 'system', name: '系统',
    chapter: '', emoji: '',
  },
};

// ─── 状�?────────────────────────────────────
let script = [];
let currentLine = 0;
let currentDebateId = null;
let debateActive = false;
let totalRoundsSeen = 0;

// ══════════════════════════════════════════════�?
// 水晶管理 (5.1 �?6枚水�?
// ══════════════════════════════════════════════�?
function smartScroll(el) { const nearBottom = (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 200); if (!nearBottom) return; smartScroll(el); }

function updateCrystals(completedRounds) {
  const crystals = crystalRow.querySelectorAll('.crystal');
  crystals.forEach((c, i) => {
    // i=0→round1, i=1→round2, ...
    const roundNum = i + 1;
    c.classList.remove('done', 'current');
    if (roundNum <= completedRounds) {
      c.classList.add('done');
    }
    if (roundNum === completedRounds + 1 && debateActive) {
      c.classList.add('current');
    }
  });
}

// ══════════════════════════════════════════════�?
// 迷你进度�?(5.4)
// ══════════════════════════════════════════════�?
function updateProgressBar(round, agentId) {
  const segs = scriptProgress.querySelectorAll('.seg');
  segs.forEach((s, i) => {
    s.classList.remove('done', 'current', 'zhuangzi', 'nietzsche', 'beauvoir');
    if (i < round - 1) {
      // 已完成段：根据轮次判断归�?
      const ag = CONFIG.roundAgent(i);
      s.classList.add('done', ag.id);
    }
    if (i === round - 1) {
      s.classList.add('current');
    }
  });
  scriptProgress.classList.add('visible');
}

// ══════════════════════════════════════════════�?
// 侧影呼吸 (5.2)
// ══════════════════════════════════════════════�?
function setSilhouetteThinking(agentId, isThinking) {
  const silhouettes = document.querySelectorAll('.silhouette');
  silhouettes.forEach((s) => {
    if (s.dataset.agent === agentId && isThinking) {
      s.classList.add('thinking');
    } else {
      s.classList.remove('thinking');
    }
  });
}

// ══════════════════════════════════════════════�?
// 碰撞效果 (5.3 �?增强�? 原有 + 花瓣炸开 + 星星闪烁)
// ══════════════════════════════════════════════�?
function triggerCollision(intensity = 0.6) {
  // 原有：速度�?+ 集中�?+ 冲击文字 + 气泡闪烁
  speedLines.classList.add('active');
  setTimeout(() => speedLines.classList.remove('active'), 800);

  concentrationLines.classList.add('active');
  setTimeout(() => concentrationLines.classList.remove('active'), 600);

  impactText.textContent = '�?;
  impactText.classList.add('show');
  setTimeout(() => impactText.classList.remove('show'), 1000);

  speechBubble.classList.add('collision-flash');
  setTimeout(() => speechBubble.classList.remove('collision-flash'), 300);

  // 新增：花瓣爆�?
  const petals = document.querySelectorAll('.petal');
  petals.forEach((p) => {
    const angle = Math.random() * Math.PI * 2;
    const dist = 40 + intensity * 140;
    p.style.transition = 'none';
    p.style.transform =
      `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px) scale(2.5)`;
    p.style.opacity = '0.9';
    setTimeout(() => {
      p.style.transition = 'all 1.5s ease-out';
      p.style.transform = 'translate(0, 0) scale(1)';
      p.style.opacity = '0.4';
    }, 50);
  });

  // 新增：星星闪�?
  const stars = document.querySelectorAll('.star');
  stars.forEach((s) => {
    if (Math.random() < 0.5) {
      s.classList.add('burst');
      setTimeout(() => s.classList.remove('burst'), 400 + Math.random() * 300);
    }
  });
}

// ══════════════════════════════════════════════�?
// Typing 指示�?(批量确认 2.1)
// ══════════════════════════════════════════════�?
function showTyping(name) {
  typingText.textContent = `${name} 正在酝酿回应…`;
  typingIndicator.style.display = 'flex';
}
function hideTyping() {
  typingIndicator.style.display = 'none';
}

// ══════════════════════════════════════════════�?
// 错误横幅 (批量确认 2.3)
// ══════════════════════════════════════════════�?
function showError(message) {
  errorBanner.textContent = `⚠️ ${message}`;
  errorBanner.style.display = 'block';
  setTimeout(() => { errorBanner.style.display = 'none'; }, 8000);
}

// ══════════════════════════════════════════════�?
// 渲染单条消息
// ══════════════════════════════════════════════�?
function showLine(msg) {
  hideTyping();

  if (msg.type === 'collision') {
    triggerCollision(msg.intensity || 0.6);
    return;
  }

  const agentId = msg.agentId || msg.agent || msg.speaker || 'system';
  const cls = speakerConfig[agentId] || speakerConfig.system;

  // 更新名字标签
  nameTag.className = 'name-tag ' + cls.tag;
  nameTag.textContent = cls.emoji ? `${cls.emoji} ${cls.name}` : cls.name;

  // 更新对话气泡
  speechBubble.className = 'speech-bubble ' + cls.bubble;
  speechBubble.textContent = msg.content || msg.text || '...';

  // 更新章节标签
  const round = msg.round;
  if (round !== undefined && round > 0) {
    if (round > totalRoundsSeen) totalRoundsSeen = round;
    chapterLabel.textContent = `�?{round}�?· ${cls.chapter || '辩论'}`;
    updateCrystals(round);
    updateProgressBar(round, agentId);

    // 首轮后显示追问框
    if (round >= 1 && debateActive) {
      questionRow.classList.add('visible');
    }
  }
}

// ══════════════════════════════════════════════�?
// 手动推进
// ══════════════════════════════════════════════�?
function advanceScript() {
  if (currentLine >= script.length) return;
  showLine(script[currentLine]);
  currentLine++;

  // 更新快进按钮可见�?
  const remaining = script.length - currentLine;
  if (remaining > 1) {
    btnFastForward.classList.add('visible');
    btnFastForward.textContent = `�?${remaining}`;
  } else {
    btnFastForward.classList.remove('visible');
  }

  // 更新nav-hint
  if (remaining > 0) {
    navHint.textContent = `TAP �?(${remaining})`;
    navHint.style.display = 'block';
  } else {
    navHint.style.display = 'none';
  }
}

// ══════════════════════════════════════════════�?
// 快进 (5.4)
// ══════════════════════════════════════════════�?
let fastForwardTimer = null;
function fastForward() {
  if (fastForwardTimer) return;
  btnFastForward.textContent = '▶▶�?;
  fastForwardTimer = setInterval(() => {
    if (currentLine >= script.length) {
      clearInterval(fastForwardTimer);
      fastForwardTimer = null;
      btnFastForward.classList.remove('visible');
      navHint.style.display = 'none';
      return;
    }
    showLine(script[currentLine]);
    currentLine++;
  }, 80);
  // 点击屏幕停止快进
  const stopFF = () => {
    if (fastForwardTimer) {
      clearInterval(fastForwardTimer);
      fastForwardTimer = null;
      const rem = script.length - currentLine;
      if (rem > 1) {
        btnFastForward.classList.add('visible');
        btnFastForward.textContent = `�?${rem}`;
      } else {
        btnFastForward.classList.remove('visible');
      }
      navHint.textContent = rem > 0 ? `TAP �?(${rem})` : '';
      navHint.style.display = rem > 0 ? 'block' : 'none';
    }
    appFrame.removeEventListener('click', stopFF);
    document.removeEventListener('keydown', stopFFKey);
  };
  const stopFFKey = (e) => {
    if (e.key === ' ' || e.key === 'Enter' || e.key === 'Escape') {
      e.preventDefault();
      stopFF();
    }
  };
  setTimeout(() => {
    appFrame.addEventListener('click', stopFF);
    document.addEventListener('keydown', stopFFKey);
  }, 100);
}

// ══════════════════════════════════════════════�?
// 追问 (5.5)
// ══════════════════════════════════════════════�?
function askQuestion() {
  const input = $('questionInput');
  const question = input.value.trim();
  if (!question || !currentDebateId) return;
  input.value = '';

  // 显示自己的追问气�?
  const bubble = document.createElement('div');
  bubble.className = 'user-question-bubble';
  bubble.textContent = `💬 ${question}`;
  speechBubble.insertAdjacentElement('afterend', bubble);
  smartScroll(bubble);

  // 发送到后端
  fetch(`${CONFIG.socketURL}/api/spectator/question`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ debateId: currentDebateId, question }),
  }).catch(() => {
    // 降级: 通过 socket 发�?
    socket.emit('user_message', { debateId: currentDebateId, agentId: 'zhuangzi', message: question });
  });
}

// ══════════════════════════════════════════════�?
// Socket 事件监听
// ══════════════════════════════════════════════�?

// debate_started (批量确认 2.5)
socket.on('debate_started', (msg) => {
  console.log('[辩论开始]', msg.debateId, msg.topic);
  currentDebateId = msg.debateId;
  debateActive = true;
  chapterLabel.textContent = '辩论中�?;
  $('btnStart').disabled = true;
  updateCrystals(0);
});

// agent_speaking �?侧影呼吸 (5.2) + typing
socket.on('agent_speaking', (msg) => {
  const agentId = msg.agent || msg.agentId || 'zhuangzi';
  const name = msg.name || speakerConfig[agentId]?.name || '哲学�?;
  setSilhouetteThinking(agentId, true);
  showTyping(name);
  // 3秒后自动解除thinking状�?
  setTimeout(() => setSilhouetteThinking(agentId, false), 4000);
});

// debate_message �?推入script
socket.on('debate_message', (msg) => {
  hideTyping();
  const payload = msg.payload || msg;
  // 解除所有侧�?
  document.querySelectorAll('.silhouette').forEach((s) => s.classList.remove('thinking'));
  script.push(payload);
  if (script.length === 1) advanceScript();
});

// heatmap_update
socket.on('heatmap_update', (data) => {
  if (data.collisions) {
    data.collisions.forEach((c) => {
      script.push({ type: 'collision', intensity: c.intensity || 0.5 });
    });
  }
  if (script.length === 1) advanceScript();
});

// collision_event �?触发碰撞效果 + 推入script
socket.on('collision_event', (msg) => {
  script.push({
    type: 'collision',
    intensity: msg.intensity || 0.7,
    from: msg.from_agent || msg.fromName,
    to: msg.to_agent || msg.toName,
  });
  if (script.length === 1) advanceScript();
});

// quality_update (批量确认 2.5)
socket.on('quality_update', (msg) => {
  // 可在章节标签显示实时质量
  if (msg.score !== undefined) {
    chapterLabel.textContent = `质量: ${msg.score}`;
    setTimeout(() => {
      if (debateActive) chapterLabel.textContent = `�?{totalRoundsSeen}�?· 辩论中`;
    }, 2000);
  }
});

// debate_ended �?质量报告 (5.6)
socket.on('debate_ended', (data) => {
  hideTyping();
  debateActive = false;
  const payload = data.payload || data;

  // 暗化画面
  appFrame.classList.add('dimmed-for-report');

  // 填充报告
  const score = payload.score || payload.quality || '--';
  const rounds = payload.debate_count || payload.rounds || totalRoundsSeen || '--';
  const avgCollision =
    payload.collision_avg || payload.avgIntensity || '--';

  $('reportScore').textContent = score;
  $('reportStats').innerHTML = `
    <div class="stat-item">
      <div class="stat-value">${rounds}</div>
      <div class="stat-label">辩论轮次</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${typeof avgCollision === 'number' ? avgCollision.toFixed(2) : avgCollision}</div>
      <div class="stat-label">平均碰撞</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">${totalRoundsSeen}</div>
      <div class="stat-label">完成发言</div>
    </div>
  `;

  // 弹窗渐显
  setTimeout(() => {
    reportOverlay.classList.add('show');
  }, 400);

  // 更新UI
  $('btnStart').disabled = false;
  $('btnFastForward').classList.remove('visible');
  navHint.style.display = 'none';
  questionRow.classList.remove('visible');
  chapterLabel.textContent = '辩论结束';
  updateCrystals(totalRoundsSeen);
});

// debate_error (批量确认 2.3)
socket.on('debate_error', (msg) => {
  hideTyping();
  debateActive = false;
  showError(msg.message || '辩论异常中断');
  $('btnStart').disabled = false;
  document.querySelectorAll('.silhouette').forEach((s) => s.classList.remove('thinking'));
});

// agent_reply �?旁观者追问回�?
socket.on('agent_reply', (data) => {
  if (data.reply) {
    const agentName = data.agentName || data.agentId || '哲学�?;
    script.push({
      speaker: data.agentId || 'system',
      agentId: data.agentId,
      content: `📩 ${agentName} 回复: ${data.reply}`,
      round: totalRoundsSeen,
    });
    if (currentLine >= script.length - 1) advanceScript();
  }
});

// ══════════════════════════════════════════════�?
// 交互：点�?+ 键盘
// ══════════════════════════════════════════════�?
appFrame.addEventListener('click', (e) => {
  // 不拦截按钮和输入�?
  if (e.target.closest('button, input, .report-overlay,.btn-close')) return;
  if (fastForwardTimer) return; // 快进中不响应
  advanceScript();
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowRight') {
    // 不在输入框中才推�?
    if (document.activeElement?.tagName === 'INPUT') return;
    e.preventDefault();
    if (fastForwardTimer) return;
    advanceScript();
  }
});

// ══════════════════════════════════════════════�?
// 开始辩�?
// ══════════════════════════════════════════════�?
function startDebate() {
  const topic = $('topicInput').value.trim();
  if (!topic) return;

  // 重置
  script = [];
  currentLine = 0;
  totalRoundsSeen = 0;
  debateActive = true;
  currentDebateId = null;

  chapterLabel.textContent = '连接中�?;
  updateCrystals(0);
  updateProgressBar(0, null);

  // 重置进度�?
  scriptProgress.querySelectorAll('.seg').forEach((s) => {
    s.classList.remove('done', 'current', 'zhuangzi', 'nietzsche', 'beauvoir');
  });
  scriptProgress.classList.remove('visible');

  $('btnStart').disabled = true;
  $('btnFastForward').classList.remove('visible');
  questionRow.classList.remove('visible');
  navHint.style.display = 'block';
  navHint.textContent = 'TAP �?;
  reportOverlay.classList.remove('show');
  appFrame.classList.remove('dimmed-for-report');
  errorBanner.style.display = 'none';
  hideTyping();
  document.querySelectorAll('.silhouette').forEach((s) => s.classList.remove('thinking'));

  // 显示等待
  nameTag.className = 'name-tag system';
  nameTag.textContent = '系统';
  speechBubble.className = 'speech-bubble bubble-system';
  speechBubble.textContent = `辩题: ${topic}\n\n等待哲学家入场…`;

  // 发起辩论
  fetch(`${CONFIG.socketURL}/api/debate/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      topic,
      maxRounds: CONFIG.maxRounds,
      agents: ['zhuangzi', 'nietzsche', 'beauvoir'],
    }),
  })
    .then((r) => r.json())
    .then((data) => {
      console.log('Debate started:', data);
      if (data.debateId) {
        currentDebateId = data.debateId;
        socket.emit('join_debate', data.debateId);
      }
      if (data.messages && data.messages.length > 0) {
        data.messages.forEach((m) => script.push(m));
        advanceScript();
      }
    })
    .catch((err) => {
      console.error('Backend unavailable, running demo mode');
      currentDebateId = 'demo_' + Date.now();
      chapterLabel.textContent = '演示模式';
      // Demo 回退
      script.push({
        agentId: 'zhuangzi', speaker: 'zhuangzi',
        content: `关于"${topic}"——善哉斯问！然汝之所思，仍在"�?中打转。天地与我并生，万物与我为一。所谓辩题，不过�?彼亦一是非，此亦一是非"的新名相罢了。`,
        round: 1,
      });
      script.push({ type: 'collision', intensity: 0.5 });
      script.push({
        agentId: 'nietzsche', speaker: 'nietzsche',
        content: `哈！${topic}——又是一个好问题，像锤子敲在旧石板上！真正的力量不索取答案——它创造价值。用锤子敲碎这个问题本身，在废墟上建造你自己的真理。`,
        round: 1,
      });
      script.push({ type: 'collision', intensity: 0.7 });
      script.push({
        agentId: 'beauvoir', speaker: 'beauvoir',
        content: `我必须追问：在这个问题背后，是谁在问？在什么样的处境中问？抽象的哲学必须回到具体的生命。自由从来不是一个人的事业—�?{topic}，正是在相互承认中显现。`,
        round: 2,
      });
      script.push({ type: 'collision', intensity: 0.6 });
      advanceScript();
    })
    .finally(() => {
      $('btnStart').disabled = false;
    });
}

// ══════════════════════════════════════════════�?
// 关闭报告
// ══════════════════════════════════════════════�?
function closeReport() {
  reportOverlay.classList.remove('show');
  appFrame.classList.remove('dimmed-for-report');
  navHint.style.display = 'block';
  navHint.textContent = 'TAP �?;
}

// ══════════════════════════════════════════════�?
// 初始�?
// ══════════════════════════════════════════════�?
updateCrystals(0);
scriptProgress.querySelectorAll('.seg').forEach((s) => {
  s.classList.remove('done', 'current');
});
</script>
