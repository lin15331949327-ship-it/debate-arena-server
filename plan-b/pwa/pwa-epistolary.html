/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
   жҖқжғід№Ұз®Җ Epistolary вҖ?жү“зЈЁзү?v2
   дҫҳеҜӮзәёзә№ В· жҡ–еўЁиүІзі» В· зў°ж’һе…үеҪ©
   иҝ·дҪ ж°ҙжҷ¶ В· зғӯеҠӣеӣ?В· иҙЁйҮҸжҠҘе‘Ҡ В· еҫ®дәӨдә?
   и®ҫи®ЎиҜӯиЁҖ: Digital Epistle ж•°еӯ—д№Ұз®Җ
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/

:root {
  /* в”Җв”Җ жҡ–еўЁиүІзі» (Ink-on-Paper) в”Җв”Җ */
  --paper-warm: #0f0d0a;
  --paper-surface: #161310;
  --paper-elevated: #1c1814;
  --paper-border: rgba(200,180,150,0.06);

  /* в”Җв”Җ еўЁиүІж–Үеӯ— в”Җв”Җ */
  --ink-primary: #e8e4dc;
  --ink-secondary: #b8b0a4;
  --ink-muted: #6e6860;
  --ink-timestamp: #585248;

  /* в”Җв”Җ еә„е‘Ё В· з«№йқ’еў?в”Җв”Җ */
  --zhuangzi-ink: #5a8a4a;
  --zhuangzi-ink-light: #7ab86a;
  --zhuangzi-glow: rgba(90,138,74,0.35);
  --zhuangzi-bg: linear-gradient(160deg, rgba(40,70,30,0.28), rgba(25,45,18,0.35));
  --zhuangzi-border: rgba(90,138,74,0.18);
  --zhuangzi-text: #c8e0c0;

  /* в”Җв”Җ е°јйҮҮ В· жңұз Ӯеў?в”Җв”Җ */
  --nietzsche-ink: #c84030;
  --nietzsche-ink-light: #e85848;
  --nietzsche-glow: rgba(200,64,48,0.4);
  --nietzsche-bg: linear-gradient(160deg, rgba(70,22,18,0.32), rgba(50,14,10,0.38));
  --nietzsche-border: rgba(200,64,48,0.22);
  --nietzsche-text: #f0c8c0;

  /* в”Җв”Җ жіўдјҸеЁ?В· йқӣи“қеў?в”Җв”Җ */
  --beauvoir-ink: #4a80c8;
  --beauvoir-ink-light: #6a9ee0;
  --beauvoir-glow: rgba(74,128,200,0.3);
  --beauvoir-bg: linear-gradient(160deg, rgba(20,35,60,0.28), rgba(12,24,44,0.35));
  --beauvoir-border: rgba(74,128,200,0.18);
  --beauvoir-text: #c8d8f0;

  /* в”Җв”Җ зі»з»ҹ/йҮ‘еўЁ в”Җв”Җ */
  --gold-ink: #c8a850;
  --gold-glow: rgba(200,168,80,0.3);

  /* в”Җв”Җ жҺ’зүҲ в”Җв”Җ */
  --font-serif: 'Noto Serif SC', 'Ma Shan Zheng', serif;
  --font-chat: system-ui, 'SF Pro Text', 'Segoe UI', 'Noto Sans SC', sans-serif;
  --font-display: 'Ma Shan Zheng', 'Noto Serif SC', cursive;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}

body{
  background:#080604;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  font-family:var(--font-chat);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* в•җв•җв•?жЎҢйқўиғҢжҷҜ вҖ?д№ҰжЎҲ (дҫҳеҜӮзәёзә№) в•җв•җв•?*/
.desk{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 50% 30%, #1a1510 0%, #0f0d0a 60%, #080604 100%);
}
/* зәёзә№еҸ еҠ еұ?*/
.desk::after{
  content:'';position:absolute;inset:0;
  opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='paper'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23paper)'/%3E%3C/svg%3E");
  background-size:200px;
  pointer-events:none;
}

/* в•җв•җв•?App е®№еҷЁ в•җв•җв•?*/
.app-container{
  position:relative;z-index:10;
  width:100vw;max-width:480px;
  height:100vh;height:100dvh;
  margin:0 auto;
  background:var(--paper-warm);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(200,180,150,0.03);
}
/* е®№еҷЁзәёзә№ */
.app-container::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:999;
  opacity:0.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size:180px;
}

@media(min-width:769px){
  .app-container{
    margin:20px auto;
    border-radius:24px;
    border:1px solid rgba(200,180,150,0.06);
    height:min(820px,90vh);
    box-shadow:
      0 0 0 1px rgba(200,180,150,0.04),
      0 16px 48px rgba(0,0,0,.5);
  }
}

/* в•җв•җв•?йЎ¶йғЁж ?в•җв•җв•?*/
.top-bar{
  display:flex;align-items:center;
  padding:6px 14px;
  border-bottom:1px solid var(--paper-border);
  gap:10px;
  flex-shrink:0;
  height:50px;min-height:50px;max-height:50px;
  background:var(--paper-surface);
}

.status-indicator{
  font-size:0.7rem;font-weight:500;
  letter-spacing:0.06em;white-space:nowrap;
  padding:4px 12px;border-radius:10px;
  flex-shrink:0;transition:all .4s ease;
  font-family:var(--font-serif);
}
.status-indicator.debate{
  background:rgba(200,180,150,0.06);
  color:var(--ink-secondary);
  border:1px solid rgba(200,180,150,0.1);
}
.status-indicator.private{
  background:rgba(74,128,200,0.1);
  color:var(--beauvoir-ink-light);
  border:1px solid rgba(74,128,200,0.18);
}

/* в”Җв”Җ иҝ·дҪ ж°ҙжҷ¶иЎ?(ж–ҮжЎЈиҰҒжұӮпјҡйЎ¶йғЁеҜјиҲӘж Ҹиҝ·дҪ ж°ҙжҷ¶) в”Җв”Җ */
.mini-crystals{
  display:flex;gap:3px;align-items:center;
  margin-left:auto;margin-right:8px;
}
.mini-crystal{
  width:14px;height:14px;
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  background:rgba(255,255,255,0.04);
  transition:all .5s ease;
  position:relative;
}
.mini-crystal[data-agent="zhuangzi"].done{
  background:rgba(90,138,74,0.6);
  box-shadow:0 0 6px var(--zhuangzi-glow);
}
.mini-crystal[data-agent="nietzsche"].done{
  background:rgba(200,64,48,0.6);
  box-shadow:0 0 6px var(--nietzsche-glow);
}
.mini-crystal[data-agent="beauvoir"].done{
  background:rgba(74,128,200,0.6);
  box-shadow:0 0 6px var(--beauvoir-glow);
}
.mini-crystal.current{
  animation:crystalMiniPulse 1.6s ease-in-out infinite;
}
@keyframes crystalMiniPulse{
  0%,100%{transform:scale(1);opacity:.5}
  50%{transform:scale(1.3);opacity:1}
}

/* в”Җв”Җ еӨҙеғҸ в”Җв”Җ */
.top-avatars{
  display:flex;align-items:center;gap:4px;
}
.top-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;cursor:pointer;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  position:relative;flex-shrink:0;
  overflow:hidden;
}
/* еӨҙеғҸзӮ№еҮ»ж¶ҹжјӘ */
.top-avatar::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:transparent;
  transition:all .4s ease;
}
.top-avatar:active::before{
  background:rgba(255,255,255,0.08);
  animation:avatarRipple .5s ease-out;
}
@keyframes avatarRipple{
  0%{transform:scale(.8);opacity:1}
  100%{transform:scale(1.6);opacity:0}
}
.top-avatar:hover{transform:scale(1.12)}
.top-avatar.zhuangzi{
  background:linear-gradient(135deg,rgba(74,110,58,.45),rgba(26,46,20,.55));
  border:1px solid rgba(107,142,90,.2);
  box-shadow:0 0 6px var(--zhuangzi-glow);
}
.top-avatar.nietzsche{
  background:linear-gradient(135deg,rgba(200,70,40,.45),rgba(70,24,10,.55));
  border:1px solid rgba(200,70,40,.25);
  box-shadow:0 0 6px var(--nietzsche-glow);
}
.top-avatar.beauvoir{
  background:linear-gradient(135deg,rgba(74,128,200,.4),rgba(22,48,80,.5));
  border:1px solid rgba(74,128,200,.2);
  box-shadow:0 0 6px var(--beauvoir-glow);
}
.top-avatar.selected{
  box-shadow:0 0 12px rgba(255,255,255,.25),0 0 0 2px rgba(255,255,255,.18);
  transform:scale(1.06);
}
.top-avatar::after{
  content:'';position:absolute;bottom:0;right:0;
  width:7px;height:7px;border-radius:50%;
  background:#5a8a4a;
  border:1.5px solid var(--paper-warm);
}

/* в•җв•җв•?иҜқйўҳиҫ“е…Ҙж ?в•җв•җв•?*/
.topic-input-bar{
  display:flex;gap:8px;padding:8px 14px;
  border-bottom:1px solid var(--paper-border);
  flex-shrink:0;
  background:var(--paper-warm);
}
.topic-input-bar input{
  flex:1;padding:8px 14px;border-radius:18px;
  border:1px solid var(--paper-border);
  background:rgba(255,255,255,0.03);
  color:var(--ink-primary);
  font-size:0.78rem;font-family:inherit;
  outline:none;
  transition:border-color .3s;
}
.topic-input-bar input:focus{
  border-color:rgba(200,180,150,0.2);
}
.topic-input-bar input::placeholder{color:var(--ink-muted)}
.topic-input-bar button{
  padding:8px 18px;border-radius:18px;border:none;
  background:linear-gradient(135deg,var(--beauvoir-ink),#3058a0);
  color:#fff;font-size:0.78rem;cursor:pointer;
  white-space:nowrap;transition:all .25s cubic-bezier(.4,0,.2,1);
  font-family:var(--font-serif);letter-spacing:1px;
}
.topic-input-bar button:hover{
  box-shadow:0 0 14px rgba(74,128,200,.35);
  transform:translateY(-1px);
}
.topic-input-bar button:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* в•җв•җв•?иҒҠеӨ©еҶ…е®№еҢ?в•җв•җв•?*/
.chat-content{
  flex:1;overflow-y:auto;
  padding:0.6rem 0.4rem 0.4rem;
  display:flex;flex-direction:column;
  gap:0.4rem;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.chat-content::-webkit-scrollbar{width:3px}
.chat-content::-webkit-scrollbar-thumb{
  background:rgba(200,180,150,0.08);border-radius:3px;
}

/* в”Җв”Җ ж—ҘжңҹеҲҶйҡ”зә?(д№Ұз®ҖйЈҺж ј) в”Җв”Җ */
.date-sep{
  text-align:center;margin:0.5rem 0 0.2rem;
  display:flex;align-items:center;gap:10px;
  padding:0 16px;
}
.date-sep::before,.date-sep::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,var(--paper-border),transparent);
}
.date-sep span{
  display:inline-block;padding:0.2rem 0.8rem;
  background:rgba(200,180,150,0.04);
  border:1px solid var(--paper-border);
  border-radius:12px;
  font-size:0.6rem;color:var(--ink-timestamp);
  letter-spacing:0.06em;
  font-family:var(--font-serif);
  white-space:nowrap;
}

/* в”Җв”Җ ж¶ҲжҒҜз»?в”Җв”Җ */
.msg-group{
  display:flex;flex-direction:column;gap:2px;
  max-width:84%;
  animation:msgSlideIn .4s cubic-bezier(.22,.61,.36,1);
}
@media(min-width:769px){.msg-group{max-width:62%}}
.msg-group.received{align-self:flex-start}

@keyframes msgSlideIn{
  from{opacity:0;transform:translateY(10px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* в”Җв”Җ ж¶ҲжҒҜж°”жіЎ в”Җв”Җ */
.msg-bubble{
  padding:0.55rem 0.75rem;line-height:1.7;
  position:relative;word-break:break-word;
  font-size:14px;
  transition:border-color .3s ease, box-shadow .3s ease;
}

/* еә„еӯҗж°”жіЎ */
.msg-bubble.zhuangzi-bubble{
  background:var(--zhuangzi-bg);
  border:1px solid var(--zhuangzi-border);
  color:var(--zhuangzi-text);
  border-radius:4px 16px 16px 12px;
  box-shadow:0 1px 8px rgba(90,138,74,0.06);
}
.msg-bubble.zhuangzi-bubble.collision-glow{
  border-color:rgba(90,138,74,0.7)!important;
  box-shadow:0 0 18px var(--zhuangzi-glow),0 0 36px rgba(90,138,74,0.12)!important;
}

/* е°јйҮҮж°”жіЎ */
.msg-bubble.nietzsche-bubble{
  background:var(--nietzsche-bg);
  border:1px solid var(--nietzsche-border);
  color:var(--nietzsche-text);
  border-radius:3px 12px 3px 12px;
  box-shadow:0 1px 8px rgba(200,64,48,0.06);
  clip-path:polygon(0% 0%,97% 0%,100% 3%,100% 97%,97% 100%,0% 100%,2% 97%,2% 3%);
}
.msg-bubble.nietzsche-bubble.collision-glow{
  border-color:rgba(200,64,48,0.8)!important;
  box-shadow:0 0 20px var(--nietzsche-glow),0 0 40px rgba(200,64,48,0.15)!important;
}

/* жіўдјҸеЁғж°”жі?*/
.msg-bubble.beauvoir-bubble{
  background:var(--beauvoir-bg);
  border:1px solid var(--beauvoir-border);
  color:var(--beauvoir-text);
  border-radius:12px;
  box-shadow:0 1px 8px rgba(74,128,200,0.06);
}
.msg-bubble.beauvoir-bubble.collision-glow{
  border-color:rgba(74,128,200,0.7)!important;
  box-shadow:0 0 18px var(--beauvoir-glow),0 0 36px rgba(74,128,200,0.12)!important;
}

/* зі»з»ҹж¶ҲжҒҜж°”жіЎ */
.msg-bubble.system-bubble{
  background:rgba(200,180,150,0.04);
  border:1px solid rgba(200,180,150,0.1);
  color:var(--ink-secondary);
  border-radius:10px;text-align:center;
  font-size:12px;padding:0.35rem 0.6rem;
  font-style:italic;
}

/* зғӯеҠӣеӣҫиҝ·дҪ ж¶ҲжҒ?*/
.msg-bubble.heatmap-bubble{
  background:rgba(200,180,150,0.05);
  border:1px solid rgba(200,180,150,0.12);
  border-radius:12px;
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--ink-muted);
  padding:0.4rem 0.7rem;
}

/* иҙЁйҮҸжҠҘе‘Ҡж°”жіЎ */
.msg-bubble.report-bubble{
  background:linear-gradient(160deg,rgba(60,45,20,0.35),rgba(40,28,10,0.4));
  border:1px solid rgba(200,168,80,0.35);
  border-radius:14px;
  text-align:center;
  padding:0.8rem 1rem;
  box-shadow:0 0 20px rgba(200,168,80,0.08);
  animation:msgSlideIn .5s cubic-bezier(.22,.61,.36,1);
}
.report-bubble .report-title{
  font-family:var(--font-display);
  font-size:18px;color:var(--gold-ink);
  letter-spacing:3px;margin-bottom:8px;
}
.report-bubble .report-score{
  font-size:36px;font-weight:200;
  color:var(--gold-ink);
  font-family:var(--font-serif);
}
.report-bubble .report-stats{
  display:flex;gap:16px;justify-content:center;
  margin-top:8px;flex-wrap:wrap;
}
.report-bubble .report-stat{
  text-align:center;
}
.report-bubble .report-stat .val{
  font-size:16px;color:var(--ink-primary);font-weight:500;
}
.report-bubble .report-stat .lbl{
  font-size:10px;color:var(--ink-muted);
  text-transform:uppercase;letter-spacing:1px;
}

/* в”Җв”Җ ж¶ҲжҒҜе…ғж•°жҚ?в”Җв”Җ */
.msg-meta{
  display:flex;align-items:center;gap:4px;
  font-size:0.58rem;color:var(--ink-timestamp);
  padding:0 5px;margin-top:1px;
  font-family:var(--font-serif);
}

/* в•җв•җв•?Typing жҢҮзӨәеҷ?в•җв•җв•?*/
.typing-indicator-wrap{
  display:flex;padding:0 0.7rem 0.2rem;min-height:26px;
}
.typing-indicator{
  display:flex;align-items:center;gap:4px;
  padding:0.4rem 0.65rem;max-width:fit-content;
  animation:msgSlideIn .3s ease-out;
  background:rgba(200,180,150,0.04);
  border:1px solid var(--paper-border);
  border-radius:12px;
  color:var(--ink-secondary);font-size:12px;
  font-style:italic;
}
.typing-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--ink-muted);
  animation:dotBounce 1.5s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{
  0%,60%,100%{transform:translateY(0);opacity:.35}
  30%{transform:translateY(-4px);opacity:.9}
}
.typing-indicator .typing-name{
  margin-left:4px;color:var(--ink-secondary);
  font-size:11px;
}

/* в•җв•җв•?иҫ“е…ҘеҢәеҹҹ вҖ?зҺ»з’ғжҖҒиҝҪй—®жЎҶ в•җв•җв•?*/
.chat-input-area{
  padding:0.5rem 0.6rem max(0.7rem,env(safe-area-inset-bottom));
  border-top:1px solid var(--paper-border);
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
  background:var(--paper-surface);
}
.chat-input{
  flex:1;padding:0.55rem 0.8rem;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--paper-border);
  border-radius:22px;
  color:var(--ink-primary);
  font-size:0.8rem;outline:none;
  transition:all .3s;
  font-family:inherit;
  backdrop-filter:blur(8px);
}
.chat-input:focus{
  border-color:rgba(200,180,150,0.22);
  background:rgba(255,255,255,0.05);
}
.chat-input::placeholder{color:var(--ink-muted)}

/* еҸ‘йҖҒжҢүй’?вҖ?еҫ®дәӨдә’еј№з°?*/
.chat-send{
  width:34px;height:34px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--beauvoir-ink),#3058a0);

<script>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
   жҖқжғід№Ұз®Җ вҖ?JS е®Ңж•ҙйҖ»иҫ‘
   config В· иҝ·дҪ ж°ҙжҷ¶ В· зў°ж’һе…үеҪ© В· зғӯеҠӣеӣ?
   иҙЁйҮҸжҠҘе‘Ҡж°”жіЎ В· еҫ®дәӨдә?В· з§ҒиҒҠиҝҪй—®
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?*/

// в”Җв”Җв”Җ Config жЁЎжқҝеҢ–еҮәеҸ?в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const CONFIG = {
  socketURL: 'https://debate-arena-server-production.up.railway.app',
  maxRounds: 6,
  agents: [
    { id: 'zhuangzi', name: 'еә„еӯҗ', emoji: 'з«?, color: '#5a8a4a' },
    { id: 'nietzsche', name: 'е°јйҮҮ', emoji: 'зҒ?, color: '#c84030' },
    { id: 'beauvoir', name: 'жіўдјҸеЁ?, emoji: 'жө?, color: '#4a80c8' },
  ],
  roundAgent: (r) => CONFIG.agents[(r - 1) % 3],
  // зү№жҖ§ејҖе…?
  showPaperTexture: true,
  miniCrystals: true,
  collisionGlow: true,
  heatmapMiniSVG: true,
};

// в”Җв”Җв”Җ Service Worker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// в”Җв”Җв”Җ Socket в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const socket = io(CONFIG.socketURL);
socket.on('connect', () => { console.log('?? ТСБ¬ҪУұзВЫ·юОсЖч'); });
socket.on('connect_error', () => {
  console.warn('?? ұзВЫ·юОсЖчІ»ҝЙУГ');
  alert('?? ОЮ·ЁБ¬ҪУұзВЫ·юОсЖчЈ¬ЗлЙФәуЦШКФ»тјмІйНшВзЎЈ');
  document.getElementById('btnStart').disabled = false;
});
socket.on('disconnect', (reason) => { console.warn('?? Ул·юОсЖч¶ПҝӘ:', reason); });

// в”Җв”Җв”Җ еҝ«жҚ·йҖүжӢ©еҷ?в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const $ = (id) => document.getElementById(id);

// в”Җв”Җв”Җ зҠ¶жҖ?в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const bubbleMap = {
  zhuangzi: 'zhuangzi-bubble',
  nietzsche: 'nietzsche-bubble',
  beauvoir: 'beauvoir-bubble',
};
const chars = {
  zhuangzi: { name: 'еә„еӯҗ', emoji: 'з«? },
  nietzsche: { name: 'е°јйҮҮ', emoji: 'зҒ? },
  beauvoir: { name: 'жіўдјҸеЁ?, emoji: 'жө? },
};
let mode = 'debate';
let privateChar = null;
let msgId = 0;
let isTyping = false;
let currentDebateId = null;
let debateActive = false;
let totalRoundsSeen = 0;
let lastBubbleEl = null; // и·ҹиёӘжңҖиҝ‘дёҖжқЎе“ІеӯҰе®¶ж°”жіЎз”ЁдәҺзў°ж’һе…үеҪ©

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// иҝ·дҪ ж°ҙжҷ¶жӣҙж–°
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function smartScroll(el) { const nearBottom = (window.innerHeight + window.scrollY) >= (document.body.scrollHeight - 200); if (!nearBottom) return; smartScroll(el); }

function updateMiniCrystals(completedRounds) {
  const crystals = document.querySelectorAll('.mini-crystal');
  crystals.forEach((c, i) => {
    const r = i + 1;
    c.classList.remove('done', 'current');
    if (r <= completedRounds) {
      c.classList.add('done');
    }
    if (r === completedRounds + 1 && debateActive) {
      c.classList.add('current');
    }
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// зў°ж’һе…үеҪ© (ж–ҮжЎЈиҰҒжұӮпјҡиҒҠеӨ©ж°”жіЎиҫ№жЎҶеҸҳиү?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function triggerCollisionGlow(intensity) {
  if (!CONFIG.collisionGlow) return;
  // жүҫеҲ°жңҖиҝ‘дёҖжқЎе“ІеӯҰе®¶ж°”жіЎ
  const allBubbles = document.querySelectorAll(
    '.msg-bubble.zhuangzi-bubble,.msg-bubble.nietzsche-bubble,.msg-bubble.beauvoir-bubble'
  );
  if (allBubbles.length === 0) return;
  const target = allBubbles[allBubbles.length - 1];
  const clamped = Math.min(1, Math.max(0.2, intensity || 0.5));
  target.classList.add('collision-glow');
  const duration = 400 + clamped * 400;
  setTimeout(() => {
    target.classList.remove('collision-glow');
  }, duration);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// зғӯеҠӣеӣҫиҝ·дҪ SVG (ж–ҮжЎЈиҰҒжұӮпјҡзі»з»ҹж¶ҲжҒҜеҶ…еөҢдёүи§?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function buildHeatmapMiniSVG(matrix) {
  if (!CONFIG.heatmapMiniSVG || !matrix) return '';
  const z2n = matrix['zhuangzi-nietzsche'] || matrix['nietzsche-zhuangzi'] || 0;
  const n2b = matrix['nietzsche-beauvoir'] || matrix['beauvoir-nietzsche'] || 0;
  const b2z = matrix['beauvoir-zhuangzi'] || matrix['zhuangzi-beauvoir'] || 0;
  const maxV = Math.max(0.1, z2n, n2b, b2z);
  const zn = Math.min(1, z2n / maxV);
  const nb = Math.min(1, n2b / maxV);
  const bz = Math.min(1, b2z / maxV);
  const w = (v) => (1.5 + v * 5).toFixed(1);
  const o = (v) => (0.15 + v * 0.65).toFixed(2);

  return `
  <svg viewBox="0 0 100 87" width="40" height="35" style="vertical-align:middle;flex-shrink:0">
    <polygon points="50,5 5,75 95,75" fill="none" stroke="rgba(200,180,150,0.12)" stroke-width="0.8"/>
    <line x1="50" y1="5" x2="5" y2="75" stroke="rgba(90,138,74,${o(zn)})" stroke-width="${w(zn)}" stroke-linecap="round"/>
    <line x1="5" y1="75" x2="95" y2="75" stroke="rgba(200,64,48,${o(nb)})" stroke-width="${w(nb)}" stroke-linecap="round"/>
    <line x1="95" y1="75" x2="50" y2="5" stroke="rgba(74,128,200,${o(bz)})" stroke-width="${w(bz)}" stroke-linecap="round"/>
  </svg>`;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// ж·»еҠ ж¶ҲжҒҜж°”жіЎ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function addBubble(sender, text, extraClass = '') {
  const el = $('chatContent');
  const cls = sender === 'system' ? 'system-bubble' : (bubbleMap[sender] || '');
  const d = document.createElement('div');
  d.className = 'msg-group received';

  const bubbleCls = cls + (extraClass ? ' ' + extraClass : '');
  d.innerHTML =
    `<div class="msg-bubble ${bubbleCls}">${text}</div><div class="msg-meta">еҲҡеҲҡ</div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;

  if (cls && cls !== 'system-bubble') {
    lastBubbleEl = d.querySelector('.msg-bubble');
  }
  return d;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// иҙЁйҮҸжҠҘе‘Ҡж°”жіЎ (ж–ҮжЎЈиҰҒжұӮ + з ”з©¶еўһејә)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function showReportBubble(data) {
  const score = data.score || data.quality || '--';
  const rounds = data.debate_count || data.rounds || totalRoundsSeen || '--';
  const avgCol =
    data.collision_avg || data.avgIntensity || '--';
  const avgStr =
    typeof avgCol === 'number' ? avgCol.toFixed(2) : avgCol;

  const el = $('chatContent');
  const d = document.createElement('div');
  d.className = 'msg-group received';
  d.innerHTML = `
    <div class="msg-bubble report-bubble">
      <div class="report-title">вң?иҫ©и®әз»Ҳе№• вң?/div>
      <div class="report-score">${score}</div>
      <div class="report-stats">
        <div class="report-stat"><div class="val">${rounds}</div><div class="lbl">иҫ©и®әиҪ®ж¬Ў</div></div>
        <div class="report-stat"><div class="val">${avgStr}</div><div class="lbl">е№іеқҮзў°ж’һ</div></div>
        <div class="report-stat"><div class="val">${totalRoundsSeen}</div><div class="lbl">е®ҢжҲҗеҸ‘иЁҖ</div></div>
      </div>
    </div>
    <div class="msg-meta">иҫ©и®әз»“жқҹ</div>
  `;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// Typing
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function showTyping(name) {
  $('typingWrap').style.display = 'flex';
  if (name) $('typingName').textContent = name;
  else $('typingName').textContent = '';
}
function hideTyping() {
  $('typingWrap').style.display = 'none';
  $('typingName').textContent = '';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// й”ҷиҜҜжЁӘе№…
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function showError(message) {
  const banner = $('errorBanner');
  banner.textContent = 'вҡ?' + (message || 'иҫ©и®әеҮәй”ҷ');
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 8000);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// Socket дәӢд»¶
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?

// debate_started
socket.on('debate_started', (msg) => {
  console.log('[иҫ©и®әејҖе§Ӣ]', msg.debateId, msg.topic);
  currentDebateId = msg.debateId;
  debateActive = true;
  $('btnStart').disabled = true;
  $('statusIndicator').textContent = 'иҫ©и®әдё?;
  $('statusIndicator').className = 'status-indicator debate';
  updateMiniCrystals(0);
});

// agent_speaking
socket.on('agent_speaking', (msg) => {
  const name = msg.name || msg.agentId || 'е“ІеӯҰе®?;
  isTyping = true;
  showTyping(name);
});

// debate_message
socket.on('debate_message', (msg) => {
  hideTyping();
  isTyping = false;

  const payload = msg.payload || msg;
  if (payload.type === 'collision') {
    const intensity = payload.intensity || 0.5;
    addBubble('system', `вҡ?жҖқжғізў°ж’һ В· зғҲеәҰ ${Math.round(intensity * 100)}%`);
    triggerCollisionGlow(intensity);
  } else {
    const agentId = payload.agentId || payload.agent || payload.speaker || 'system';
    addBubble(agentId, payload.content || payload.text);
    const round = payload.round;
    if (round !== undefined && round > 0) {
      if (round > totalRoundsSeen) totalRoundsSeen = round;
      updateMiniCrystals(round);
    }
  }
});

// heatmap_update вҶ?зғӯеҠӣеӣҫиҝ·дҪ SVG
socket.on('heatmap_update', (data) => {
  const matrix = (data.payload && data.payload.matrix) || data.matrix;
  if (data.collisions) {
    data.collisions.forEach((c) => {
      addBubble('system', `вҡ?зў°ж’һеҢ?В· ${Math.round((c.intensity || 0.5) * 100)}%`);
      triggerCollisionGlow(c.intensity);
    });
  }
  if (matrix && CONFIG.heatmapMiniSVG) {
    const svg = buildHeatmapMiniSVG(matrix);
    const el = $('chatContent');
    const d = document.createElement('div');
    d.className = 'msg-group received';
    const avg = (
      ((matrix['zhuangzi-nietzsche'] || matrix['nietzsche-zhuangzi'] || 0) +
        (matrix['nietzsche-beauvoir'] || matrix['beauvoir-nietzsche'] || 0) +
        (matrix['beauvoir-zhuangzi'] || matrix['zhuangzi-beauvoir'] || 0)) /
      3
    ).toFixed(2);
    d.innerHTML = `
      <div class="msg-bubble heatmap-bubble">
        ${svg}
        <span>зў°ж’һзҹ©йҳө В· еқҮеҖ?${avg}</span>
      </div>
      <div class="msg-meta">е®һж—¶</div>
    `;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
  }
});

// collision_event
socket.on('collision_event', (msg) => {
  const fromName = msg.fromName || msg.from_agent || '?';
  const toName = msg.toName || msg.to_agent || '?';
  addBubble(
    'system',
    `вҡ?${fromName} вҶ?${toName} ${msg.collisionType || 'зў°ж’һ'} (${msg.intensity || 1})`
  );
  triggerCollisionGlow(msg.intensity || 0.6);
});

// quality_update
socket.on('quality_update', (msg) => {
  if (msg.score !== undefined) {
    $('statusIndicator').textContent = `иҙЁйҮҸ ${msg.score}`;
    setTimeout(() => {
      if (debateActive) $('statusIndicator').textContent = 'иҫ©и®әдё?;
    }, 2500);
  }
});

// debate_ended вҶ?иҙЁйҮҸжҠҘе‘Ҡж°”жіЎ
socket.on('debate_ended', (data) => {
  hideTyping();
  isTyping = false;
  debateActive = false;
  const payload = data.payload || data;
  showReportBubble(payload);
  $('btnStart').disabled = false;
  $('statusIndicator').textContent = 'иҫ©и®әз»“жқҹ';
  $('statusIndicator').className = 'status-indicator debate';
  updateMiniCrystals(totalRoundsSeen);
});

// debate_error
socket.on('debate_error', (msg) => {
  hideTyping();
  isTyping = false;
  debateActive = false;
  showError(msg.message || 'иҫ©и®әејӮеёёдёӯж–ӯ');
  $('btnStart').disabled = false;
});

// agent_reply
socket.on('agent_reply', (data) => {
  if (data.reply) {
    const agentId = data.agentId || 'agent';
    addBubble(agentId, `рҹ“© ${data.agentName || chars[agentId]?.name || 'е“ІеӯҰе®?}: ${data.reply}`);
  }
  isTyping = false;
  hideTyping();
});

// spectator_question
socket.on('spectator_question', (msg) => {
  addBubble('system', `рҹ’¬ ж—Ғи§ӮиҖ? ${msg.question}`);
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// ејҖе§Ӣиҫ©и®?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function startDebate() {
  const topic = $('topicInput').value.trim();
  if (!topic) return;

  $('chatContent').innerHTML = '';
  totalRoundsSeen = 0;
  debateActive = true;
  currentDebateId = null;
  lastBubbleEl = null;

  $('btnStart').disabled = true;
  $('statusIndicator').textContent = 'иҝһжҺҘдёӯвҖ?;
  $('statusIndicator').className = 'status-indicator debate';
  updateMiniCrystals(0);
  $('errorBanner').style.display = 'none';

  isTyping = true;
  showTyping('зі»з»ҹ');

  fetch(`${CONFIG.socketURL}/api/debate/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      topic,
      maxRounds: CONFIG.maxRounds,
      agents: ['zhuangzi', 'nietzsche', 'beauvoir'],
    }),
  })
    .then((r) => r.json())
    .then((data) => {
      hideTyping();
      if (data.debateId) {
        currentDebateId = data.debateId;
        socket.emit('join_debate', data.debateId);
      }
      if (data.messages) {
        data.messages.forEach((m) => {
          if (m.type === 'collision') {
            addBubble('system', `вҡ?зў°ж’һ В· ${Math.round((m.intensity || 0.5) * 100)}%`);
            triggerCollisionGlow(m.intensity);
          } else {
            addBubble(
              m.agentId || m.name || m.speaker || m.agent,
              m.content || m.text
            );
          }
        });
      }
      if (data.debateId) addBubble('system', 'рҹ“ң иҫ©и®әе·ІеҗҜеҠЁпјҢзӯүеҫ…е“ІеӯҰе®¶еӣһдҝЎвҖ?);
    })
    .catch(() => {
      hideTyping();
      currentDebateId = 'demo_' + Date.now();
      $('statusIndicator').textContent = 'жј”зӨәжЁЎејҸ';
      addBubble('system', 'рҹ“ң жј”зӨәжЁЎејҸ вҖ?иҝһжҺҘеҗҺз«ҜиҺ·еҸ–е®һж—¶иҫ©и®ә');
      const demo = [
        { s: 'zhuangzi', t: `е…ідәҺ"${topic}"вҖ”вҖ”еӨ©ең°дёҺжҲ‘е№¶з”ҹпјҢдёҮзү©дёҺжҲ‘дёәдёҖгҖӮ` },
        { t: 'collision', i: 0.5 },
        { s: 'nietzsche', t: `${topic}пјҹз”Ёй”Өеӯҗж•ІзўҺж—§зҹіжқҝпјҒи¶…дәәеҲӣйҖ д»·еҖјпјҢдёҚд№һжұӮжүҝи®ӨгҖӮ` },
        { t: 'collision', i: 0.7 },
        { s: 'beauvoir', t: `${topic}вҖ”вҖ”иҮӘз”ұд»ҺжқҘдёҚжҳҜдёҖдёӘдәәзҡ„дәӢдёҡгҖӮ` },
      ];
      let i = 0;
      (function n() {
        if (i >= demo.length) {
          addBubble('system', 'рҹ“ң жј”зӨәз»“жқҹ');
          hideTyping();
          $('btnStart').disabled = false;
          return;
        }
        const m = demo[i++];
        if (m.t === 'collision') {
          addBubble('system', `вҡ?зў°ж’һ В· ${Math.round(m.i * 100)}%`);
          triggerCollisionGlow(m.i);
        } else {
          addBubble(m.s, m.t);
          if (i <= 2) updateMiniCrystals(1);
          else updateMiniCrystals(2);
        }
        setTimeout(n, 1200 + Math.random() * 800);
      })();
    })
    .finally(() => {
      $('btnStart').disabled = false;
      isTyping = false;
    });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// еҸ‘йҖҒж¶ҲжҒ?(иҝҪй—®)
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function sendMessage() {
  const text = $('chatInput').value.trim();
  if (!text || isTyping) return;
  $('chatInput').value = '';

  // жҳҫзӨәиҮӘе·ұж¶ҲжҒҜ
  const el = $('chatContent');
  const d = document.createElement('div');
  d.className = 'msg-group received';
  d.style.alignSelf = 'flex-end';
  d.innerHTML = `
    <div class="msg-bubble" style="
      background:linear-gradient(160deg,rgba(74,128,200,0.18),rgba(30,55,100,0.25));
      color:#c8d8f0;border-radius:14px 14px 4px 14px;
      border:1px solid rgba(74,128,200,0.18);
    ">${text}</div>
    <div class="msg-meta">еҲҡеҲҡ</div>
  `;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;

  // еҸ‘йҖҒеҲ°еҗҺз«Ҝ
  if (mode === 'private' && privateChar) {
    socket.emit('user_message', {
      debateId: currentDebateId || 'demo',
      agentId: privateChar,
      message: text,
    });
  } else if (currentDebateId) {
    fetch(`${CONFIG.socketURL}/api/spectator/question`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ debateId: currentDebateId, question: text }),
    }).catch(() => {
      socket.emit('user_message', {
        debateId: currentDebateId,
        agentId: 'zhuangzi',
        message: text,
      });
    });
  }
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// з§ҒиҒҠеҲҮжҚў
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function togglePrivateChat(char) {
  if (isTyping) return;
  if (mode === 'private' && privateChar === char) {
    mode = 'debate';
    privateChar = null;
  } else {
    mode = 'private';
    privateChar = char;
  }
  updateUI();
}

function updateUI() {
  const indicator = $('statusIndicator');
  document.querySelectorAll('.top-avatar').forEach((a) => {
    if (mode === 'debate') {
      a.classList.add('selected');
    } else {
      a.classList.toggle('selected', a.dataset.char === privateChar);
    }
  });
  if (mode === 'debate') {
    indicator.textContent = debateActive ? 'иҫ©и®әдё? : 'д№Ұз®Җ';
    indicator.className = 'status-indicator debate';
  } else {
    const c = chars[privateChar];
    indicator.textContent = 'з§ҒиҒҠ В· ' + c.name;
    indicator.className = 'status-indicator private';
  }
}

function resetChat() {
  $('chatContent').innerHTML = '';
  mode = 'debate';
  privateChar = null;
  updateUI();
  totalRoundsSeen = 0;
  updateMiniCrystals(0);
}

function toggleFabMenu() {
  const fab = $('mobileFab');
  const menu = $('fabMenu');
  fab.classList.toggle('open');
  menu.classList.toggle('show');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// еҲқе§ӢеҢ?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
updateUI();
updateMiniCrystals(0);
</script>
