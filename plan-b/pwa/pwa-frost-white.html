/* в”Җв”Җ ж—Ҙй—ҙ В· йңңзҷҪ в”Җв”Җ */
[data-theme="light"] {
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-surface: #fafafa;
  --bg-void: #fafafa;
  --text-primary: #1d1d1f;
  --text-secondary: #555558;
  --text-tertiary: #6e6e72;
  --accent: #0071e3;
  --accent-dim: rgba(0,113,227,0.08);
  --divider: rgba(0,0,0,0.08);
  --card-bg: rgba(255,255,255,0.72);
  --card-bg-alt: rgba(255,255,255,0.62);
  --card-border: rgba(255,255,255,0.5);
  --card-shadow-1: rgba(0,0,0,0.04);
  --card-shadow-2: rgba(0,0,0,0.04);
  --card-shadow-3: rgba(0,0,0,0.06);
  --hover-lift: -2px;
  --hover-shadow-1: rgba(0,0,0,0.06);
  --hover-shadow-2: rgba(0,0,0,0.06);
  --hover-shadow-3: rgba(0,0,0,0.1);
  --role-a: #0071e3; --role-b: #e3303b; --role-c: #34c759;
  --role-a-soft: rgba(0,113,227,0.08); --role-b-soft: rgba(227,48,59,0.08); --role-c-soft: rgba(52,199,89,0.08);
  --input-bg: rgba(255,255,255,0.6);
  --input-border: rgba(0,0,0,0.08);
  --overlay-bg: rgba(0,0,0,0.25);
  --stats-bg: rgba(255,255,255,0.8);
  --question-bg: rgba(255,255,255,0.8);
  --collision-aura-color: rgba(0,0,0,0.04);
  --beam-opacity: 0.12;
  --dust-opacity: 0.25;
  --ice-opacity: 1;
  --noise-opacity: 0.015;
}

/* в”Җв”Җ еӨңй—ҙ В· йңңеӨң в”Җв”Җ */
[data-theme="dark"] {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-surface: #11161e;
  --bg-void: #0d1117;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-tertiary: #6e7681;
  --accent: #5090ff;
  --accent-dim: rgba(80,144,255,0.1);
  --divider: rgba(255,255,255,0.08);
  --card-bg: rgba(22,27,34,0.78);
  --card-bg-alt: rgba(22,27,34,0.65);
  --card-border: rgba(255,255,255,0.06);
  --card-shadow-1: rgba(0,0,0,0.2);
  --card-shadow-2: rgba(0,0,0,0.3);
  --card-shadow-3: rgba(0,0,0,0.4);
  --hover-lift: -2px;
  --hover-shadow-1: rgba(0,0,0,0.25);
  --hover-shadow-2: rgba(0,0,0,0.35);
  --hover-shadow-3: rgba(0,0,0,0.45);
  --role-a: #5090ff; --role-b: #f05050; --role-c: #40d060;
  --role-a-soft: rgba(80,144,255,0.1); --role-b-soft: rgba(240,80,80,0.1); --role-c-soft: rgba(64,208,96,0.1);
  --input-bg: rgba(22,27,34,0.7);
  --input-border: rgba(255,255,255,0.1);
  --overlay-bg: rgba(0,0,0,0.5);
  --stats-bg: rgba(22,27,34,0.85);
  --question-bg: rgba(22,27,34,0.9);
  --collision-aura-color: rgba(255,255,255,0.06);
  --beam-opacity: 0.04;
  --dust-opacity: 0.12;
  --ice-opacity: 0.6;
  --noise-opacity: 0.025;
}

/* в”Җв”Җ е…ЁеұҖиҝҮжёЎ в”Җв”Җ */
*{margin:0;padding:0;box-sizing:border-box}
html{
  font-size:16px;-webkit-font-smoothing:antialiased;
  transition: background 0.6s ease, color 0.6s ease;
}
body{
  font-family:'Noto Sans SC','Inter',-apple-system,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;position:relative;overflow-x:hidden;
  font-weight:350;letter-spacing:.01em;line-height:1.8;
  transition: background 0.6s ease, color 0.6s ease;
}

/* в”Җв”Җ е…ЁеұҖзә№зҗҶ в”Җв”Җ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:var(--noise-opacity);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  transition: opacity 0.6s ease;
}

/* в”Җв”Җ дё»е®№еҷ?в”Җв”Җ */
.main-container{
  position:relative;z-index:1;
  max-width:960px;margin:0 auto;
  padding:60px 40px 100px;
}
@media(max-width:768px){ .main-container{padding:48px 20px 80px} }
@media(max-width:480px){ .main-container{padding:40px 14px 100px} }

/* в•җв•җв•?Header в•җв•җв•?*/
.header{
  text-align:center;margin-bottom:36px;
  animation:fadeInDown .8s cubic-bezier(.22,.61,.36,1) both;
  position:relative;
}
.header-title{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:2.2rem;font-weight:300;letter-spacing:-.02em;
  color:var(--text-primary);margin-bottom:6px;
  transition: color 0.6s ease;
}
.header-subtitle{
  font-size:.95rem;font-weight:350;
  color:var(--text-secondary);
  transition: color 0.6s ease;
}
.header-divider{
  width:40px;height:1px;background:var(--divider);
  margin:20px auto;
  transition: background 0.6s ease;
}

/* в”Җв”Җ дё»йўҳеҲҮжҚўжҢүй’® в”Җв”Җ */
.theme-toggle{
  position:absolute;top:0;right:0;
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--divider);
  background:var(--card-bg);
  backdrop-filter:blur(20px);
  cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  transition:all .4s ease;
  color:var(--text-secondary);
}
.theme-toggle:hover{
  border-color:var(--accent);
  color:var(--accent);
  transform:rotate(15deg);
}
@media(max-width:480px){ .theme-toggle{top:-8px;right:-4px;width:36px;height:36px;font-size:16px} }

/* в•җв•җв•?иҜқйўҳеҢ?+ з»ҹи®Ўж ?(sticky) в•җв•җв•?*/
.topic-stats-wrap{
  position:sticky;top:0;z-index:15;
  background:var(--stats-bg);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  padding:16px 0 12px;
  margin-bottom:28px;
  border-bottom:1px solid var(--divider);
  transition:all 0.6s ease;
  animation:fadeInDown .8s cubic-bezier(.22,.61,.36,1) .1s both;
}
.topic-area{
  display:flex;gap:10px;justify-content:center;
  flex-wrap:wrap;margin-bottom:12px;
}
.topic-input{
  padding:10px 18px;border-radius:100px;
  border:1px solid var(--input-border);
  background:var(--input-bg);
  font-family:inherit;font-size:.85rem;
  color:var(--text-primary);outline:none;
  backdrop-filter:blur(20px);
  min-width:240px;flex:1;max-width:400px;
  transition:all 0.4s ease;
}
.topic-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-dim);
}

.btn-start{
  padding:10px 28px;border-radius:100px;border:none;
  background:var(--accent);color:#fff;
  font-family:inherit;font-size:.85rem;font-weight:400;
  cursor:pointer;transition:all .3s ease;white-space:nowrap;
}
.btn-start:hover{ filter:brightness(1.1);transform:scale(1.03); }
.btn-start:disabled{ opacity:.4;cursor:not-allowed;transform:none; }

/* в”Җв”Җ з»ҹи®Ўж ?(зҙ§иҙҙиҜқйўҳдёӢж–№пјҢж–ҮжЎЈиҰҒжұӮдёҠз§? в”Җв”Җ */
.stats-bar{
  display:flex;align-items:center;justify-content:center;
  gap:28px;padding:8px 0 0;
  transition:all 0.6s ease;
}
.stats-bar .stat-item{text-align:center}
.stats-bar .stat-value{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:1.1rem;font-weight:300;color:var(--text-primary);
  transition:color 0.6s ease;
}
.stats-bar .stat-label{
  font-size:.62rem;font-weight:400;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:.08em;margin-top:1px;
}
.stats-bar .stat-dot{
  width:3px;height:3px;border-radius:50%;background:var(--divider);
}

/* в•җв•җв•?иҫ©и®әиҲһеҸ° в•җв•җв•?*/
.debate-stage{
  display:flex;flex-direction:column;gap:18px;
  margin-bottom:20px;
}

/* в”Җв”Җ еҚЎзүҮ в”Җв”Җ */
.debate-card{
  position:relative;
  background:var(--card-bg);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid var(--card-border);
  border-radius:20px;
  padding:26px 30px;
  box-shadow:0 1px 2px var(--card-shadow-1),0 4px 16px var(--card-shadow-2),0 16px 48px var(--card-shadow-3);
  overflow:hidden;
  animation:cardAppear .6s cubic-bezier(.22,.61,.36,1) both;
  transition:all .4s cubic-bezier(.25,.46,.45,.94);
  cursor:pointer;
}
.debate-card:hover{
  transform:translateY(var(--hover-lift));
  box-shadow:0 1px 2px var(--hover-shadow-1),0 6px 24px var(--hover-shadow-2),0 24px 64px var(--hover-shadow-3);
}
.debate-card::before{
  content:'';position:absolute;left:0;top:20px;bottom:20px;
  width:2px;border-radius:1px;
  transition:all .4s cubic-bezier(.25,.46,.45,.94);
}
.debate-card:hover::before{ top:14px;bottom:14px;width:3px; }
.debate-card.role-a::before{ background:var(--role-a) }
.debate-card.role-b::before{ background:var(--role-b) }
.debate-card.role-c::before{ background:var(--role-c) }

/* в”Җв”Җ зў°ж’һе…үжҷ• (ж–ҮжЎЈиҰҒжұӮ) в”Җв”Җ */
.debate-card.collision-aura{
  box-shadow:
    0 0 0 6px var(--collision-aura-color),
    0 0 0 12px var(--collision-aura-color),
    0 4px 24px var(--collision-aura-color),
    0 16px 48px var(--card-shadow-3) !important;
  transition:box-shadow .6s ease-out;
}

.card-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:12px;padding-left:12px;
}
.card-icon{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:500;
  font-family:'Inter',-apple-system,sans-serif;
  color:#fff;flex-shrink:0;
}
.role-a .card-icon{background:var(--role-a)}
.role-b .card-icon{background:var(--role-b)}
.role-c .card-icon{background:var(--role-c)}
.card-name{
  font-family:'Inter',-apple-system,sans-serif;
  font-size:.9rem;font-weight:500;color:var(--text-primary);
  transition:color 0.6s ease;
}
.card-round{
  margin-left:auto;font-size:.68rem;font-weight:500;
  color:var(--text-tertiary);letter-spacing:.06em;
}
.card-body{
  padding-left:12px;font-size:.92rem;line-height:1.8;
  color:var(--text-secondary);font-weight:350;
  transition:color 0.6s ease;
}

/* в”Җв”Җ зў°ж’һеҲҶйҡ” (дҝқз•ҷе…ӢеҲ¶йЈҺж ј + еўһејәе…үжҷ•) в”Җв”Җ */
.collision-sep{
  text-align:center;padding:14px 0;margin:2px 0;
  position:relative;
}
.collision-sep .sep-line{
  width:1px;height:18px;margin:0 auto;
  background:linear-gradient(to bottom,transparent,var(--divider),var(--divider),transparent);
  transition:background 0.6s ease;
}
.collision-sep .sep-label{
  font-size:9px;color:var(--text-tertiary);
  text-transform:uppercase;letter-spacing:.1em;margin-top:3px;
  transition:color 0.6s ease;
}
/* зў°ж’һеўһејәзҺ?*/
.collision-sep::after{
  content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border-radius:50%;
  background:radial-gradient(circle,var(--collision-aura-color) 0%,transparent 70%);
  opacity:0;transition:opacity .3s ease;
}
.collision-sep.aura-active::after{
  opacity:1;
  animation:auraPulse 1.2s ease-out;
}
@keyframes auraPulse{
  0%{width:20px;height:20px;opacity:0;transform:translate(-50%,-50%)}
  40%{width:60px;height:60px;opacity:1}
  100%{width:120px;height:120px;opacity:0;transform:translate(-50%,-50%)}
}

@keyframes cardAppear{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeInDown{ from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }

/* в•җв•җв•?Idle Ambient System (дҝқз•ҷ + жҡ—иүІйҖӮй…Қ) в•җв•җв•?*/

/* в”Җв”Җ Washi Paper в”Җв”Җ */
.washi-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity 2s ease;mix-blend-mode:multiply;
}
body.idle .washi-overlay{ opacity:1; }
[data-theme="dark"] .washi-overlay{ mix-blend-mode:screen; }
.washi-overlay::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(2deg,transparent,transparent 3px,rgba(180,170,155,.03) 3px,rgba(180,170,155,.03) 4px),
    repeating-linear-gradient(88deg,transparent,transparent 5px,rgba(160,150,140,.02) 5px,rgba(160,150,140,.02) 6px);
  opacity:.7;
}

/* в”Җв”Җ Ice Crystal в”Җв”Җ */
.ice-crystal-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0;transition:opacity 1.5s ease;
}
body.idle .ice-crystal-overlay{ opacity:var(--ice-opacity); }
.ice-crystal-overlay::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-conic-gradient(rgba(180,190,210,.04) 0% .6%,transparent .6% 2.5%) 0 0/80px 100px,
    repeating-conic-gradient(rgba(190,200,220,.03) 0% .4%,transparent .4% 5%) 20px 30px/120px 150px;
  animation:frostSpin 70s linear infinite;
}
[data-theme="dark"] .ice-crystal-overlay::before{
  background:
    repeating-conic-gradient(rgba(140,180,220,.06) 0% .5%,transparent .5% 2.5%) 0 0/80px 100px,
    repeating-conic-gradient(rgba(120,160,210,.04) 0% .3%,transparent .3% 5%) 20px 30px/120px 150px;
}
@keyframes frostSpin{ 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

/* в”Җв”Җ Dawn / Aurora Cycle в”Җв”Җ */
body.idle::after{
  animation:dawnCycle 36s ease-in-out infinite;
}
[data-theme="dark"] body.idle::after{
  animation:auroraCycle 36s ease-in-out infinite;
}
@keyframes dawnCycle{
  0%,100%{background:radial-gradient(ellipse 70% 50% at 50% 25%,#faf8f3 0%,#f3efe8 40%,#ece8e0 100%)}
  30%{background:radial-gradient(ellipse 70% 50% at 50% 25%,#f8f6f2 0%,#f0efe8 40%,#eae6e0 100%)}
  50%{background:radial-gradient(ellipse 70% 50% at 50% 35%,#f5f8fa 0%,#edf0f5 40%,#e5e8ee 100%)}
  80%{background:radial-gradient(ellipse 70% 50% at 50% 20%,#f8f6f0 0%,#f0ece5 40%,#e8e4dc 100%)}
}
@keyframes auroraCycle{
  0%,100%{background:radial-gradient(ellipse 70% 50% at 50% 30%,#111c2e 0%,#0d1520 40%,#0a0f18 100%)}
  30%{background:radial-gradient(ellipse 70% 50% at 50% 28%,#161e30 0%,#0f1622 40%,#0b1018 100%)}
  50%{background:radial-gradient(ellipse 70% 50% at 50% 35%,#0f1a2a 0%,#0c141e 40%,#0a0f16 100%)}
  80%{background:radial-gradient(ellipse 70% 50% at 50% 22%,#141c2c 0%,#0e1520 40%,#0b1018 100%)}
}

/* в”Җв”Җ Light Beams вҶ?Starlight (жҡ—иүІ) в”Җв”Җ */
.light-shaft{
  position:fixed;pointer-events:none;z-index:1;
  opacity:0;transition:opacity 2s ease;
}
body.idle .light-shaft{ opacity:var(--beam-opacity); }
.light-shaft::after{
  content:'';position:absolute;
  background:linear-gradient(180deg,rgba(255,240,220,.5) 0%,rgba(255,245,235,.3) 40%,transparent 100%);
}
[data-theme="dark"] .light-shaft::after{
  background:linear-gradient(180deg,rgba(160,200,240,.25) 0%,rgba(140,180,220,.12) 40%,transparent 100%);
}
.light-beam-1{top:-20%;left:15%;width:120px;height:140%;transform:rotate(-12deg);animation:beamDrift1 28s ease-in-out infinite}
.light-beam-1::after{inset:0;clip-path:polygon(40% 0%,60% 0%,80% 100%,20% 100%)}
.light-beam-2{top:-20%;right:20%;width:90px;height:130%;transform:rotate(8deg);animation:beamDrift2 32s ease-in-out infinite;animation-delay:-10s}
.light-beam-2::after{inset:0;clip-path:polygon(35% 0%,65% 0%,85% 100%,15% 100%)}
.light-beam-3{top:-20%;left:50%;width:70px;height:120%;transform:rotate(-3deg);animation:beamDrift1 38s ease-in-out infinite;animation-delay:-20s;opacity:.08}
.light-beam-3::after{inset:0;clip-path:polygon(30% 0%,70% 0%,90% 100%,10% 100%)}
@keyframes beamDrift1{0%,100%{transform:rotate(-12deg) translateX(0);opacity:var(--beam-opacity)}25%{opacity:calc(var(--beam-opacity)*1.25);transform:rotate(-10deg) translateX(8px)}50%{opacity:calc(var(--beam-opacity)*0.83);transform:rotate(-14deg) translateX(-5px)}75%{opacity:calc(var(--beam-opacity)*1.08);transform:rotate(-11deg) translateX(3px)}}
@keyframes beamDrift2{0%,100%{transform:rotate(8deg) translateX(0);opacity:calc(var(--beam-opacity)*0.83)}33%{opacity:calc(var(--beam-opacity)*1.08);transform:rotate(10deg) translateX(-6px)}66%{opacity:calc(var(--beam-opacity)*0.75);transform:rotate(6deg) translateX(4px)}}

/* в”Җв”Җ Dust Particles в”Җв”Җ */
.dust-particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:2;
  opacity:0;transition:opacity 1.5s ease;
  background:radial-gradient(circle,rgba(200,180,140,.4) 0%,rgba(200,180,140,0) 70%);
}
[data-theme="dark"] .dust-particle{
  background:radial-gradient(circle,rgba(160,200,240,.35) 0%,rgba(160,200,240,0) 70%);
}
body.idle .dust-particle{ opacity:var(--dust-opacity); }
.dp1{width:3px;height:3px;top:16%;left:10%;animation:drift1 24s cubic-bezier(.42,0,.58,1) infinite;box-shadow:0 0 4px rgba(200,180,140,.3)}
[data-theme="dark"] .dp1{box-shadow:0 0 4px rgba(160,200,240,.25)}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// еҚЎзүҮжёІжҹ“
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function addCard(speaker, text, round) {
  const stage = $('debateStage');
  const card = document.createElement('div');
  card.className = `debate-card ${roleMap[speaker] || 'role-a'}`;
  card.innerHTML = `
    <div class="card-header">
      <div class="card-icon">${icons[speaker] || '?'}</div>
      <span class="card-name">${names[speaker] || speaker}</span>
      <span class="card-round">Round ${round}</span>
    </div>
    <div class="card-body">${text}</div>`;
  stage.appendChild(card);
  roundCount = Math.max(roundCount, round || 0);
  $('statRounds').textContent = roundCount;
  lastCardEl = card;
  smartScroll(card);
  return card;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// зў°ж’һе…үжҷ• (ж–ҮжЎЈиҰҒжұӮ + е…ӢеҲ¶зҡ„йңңзҷҪйЈҺж ?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function addCollision(intensity) {
  const stage = $('debateStage');
  const pct = Math.round((intensity || 0.5) * 100);
  const el = document.createElement('div');
  el.className = 'collision-sep';
  el.innerHTML = `<div class="sep-line"></div><div class="sep-label">вҡ?зў°ж’һ В· ${pct}%</div>`;
  stage.appendChild(el);
  collisionCount++;
  $('statCollisions').textContent = collisionCount;

  // зў°ж’һе…үжҷ•пјҡи®©зў°ж’һеҲҶйҡ”зәҝзҹӯжҡӮеҸ‘е…?
  el.classList.add('aura-active');
  setTimeout(() => el.classList.remove('aura-active'), 1400);

  // зў°ж’һе…үжҷ•пјҡжңҖиҝ‘еҚЎзүҮд№ҹжңүеҫ®ејұе…үжҷ?
  if (lastCardEl && intensity > 0.3) {
    lastCardEl.classList.add('collision-aura');
    setTimeout(() => lastCardEl.classList.remove('collision-aura'), 800 + intensity * 600);
  }

  smartScroll(el);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// Typing
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function showThinking(name) {
  const row = $('typingRow');
  row.style.display = 'flex';
  $('typingLabel').textContent = `${name || 'е“ІеӯҰе®?} жӯЈеңЁй…қй…ҝеӣһеә”вҖҰ`;
  smartScroll(row);
}
function hideThinking() {
  $('typingRow').style.display = 'none';
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// й”ҷиҜҜжЁӘе№…
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function showError(message) {
  const banner = $('errorBanner');
  banner.textContent = 'вҡ?' + (message || 'иҫ©и®әеҮәй”ҷ');
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 8000);
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// Socket дәӢд»¶
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?

// debate_started
socket.on('debate_started', (msg) => {
  console.log('[иҫ©и®әејҖе§Ӣ]', msg.debateId, msg.topic);
  currentDebateId = msg.debateId;
  debateActive = true;
  $('btnStart').disabled = true;
  $('questionBar').classList.add('visible');
});

// agent_speaking
socket.on('agent_speaking', (msg) => {
  const name = msg.name || msg.agentId || 'е“ІеӯҰе®?;
  showThinking(name);
});

// debate_message
socket.on('debate_message', (msg) => {
  hideThinking();
  const payload = msg.payload || msg;
  if (payload.type === 'collision') {
    addCollision(payload.intensity);
  } else {
    const speaker = payload.agentId || payload.agent || payload.speaker || 'zhuangzi';
    addCard(speaker, payload.content || payload.text, payload.round || 0);
    $('questionBar').classList.add('visible');
  }
});

// heatmap_update
socket.on('heatmap_update', (data) => {
  if (data.collisions) {
    data.collisions.forEach((c) => addCollision(c.intensity));
  }
});

// collision_event
socket.on('collision_event', (msg) => {
  addCollision(msg.intensity || 0.6);
});

// quality_update
socket.on('quality_update', (msg) => {
  if (msg.score !== undefined) {
    $('statScore').textContent = msg.score;
  }
});

// debate_ended
socket.on('debate_ended', (data) => {
  hideThinking();
  debateActive = false;
  const payload = data.payload || data;
  const score = payload.score || payload.quality || '--';
  $('statScore').textContent = score;
  $('reportScore').textContent = score;
  $('reportStats').innerHTML = `
    <div class="stat-item"><div class="stat-value">${roundCount}</div><div class="stat-label">жҖ»иҪ®ж¬?/div></div>
    <div class="stat-item"><div class="stat-value">${collisionCount}</div><div class="stat-label">жҖ»зў°ж’?/div></div>
    <div class="stat-item"><div class="stat-value">${score}</div><div class="stat-label">иҙЁйҮҸиҜ„еҲҶ</div></div>
  `;
  $('reportOverlay').classList.add('show');
  $('btnStart').disabled = false;
  $('questionBar').classList.remove('visible');
});

// debate_error
socket.on('debate_error', (msg) => {
  hideThinking();
  debateActive = false;
  showError(msg.message || 'иҫ©и®әејӮеёёдёӯж–ӯ');
  $('btnStart').disabled = false;
});

// agent_reply
socket.on('agent_reply', (data) => {
  if (data.reply) {
    const agentId = data.agentId || 'agent';
    addCard(agentId, `рҹ“© ${data.agentName || names[agentId] || 'е“ІеӯҰе®?}: ${data.reply}`, roundCount);
  }
});

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// ејҖе§Ӣиҫ©и®?
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function startDebate() {
  document.body.classList.remove('idle');
  const topic = $('topicInput').value.trim();
  if (!topic) return;

  $('debateStage').innerHTML = '';
  roundCount = 0;
  collisionCount = 0;
  lastCardEl = null;
  debateActive = true;
  currentDebateId = null;

  $('statRounds').textContent = '0';
  $('statCollisions').textContent = '0';
  $('statScore').textContent = '--';
  $('btnStart').disabled = true;
  $('reportOverlay').classList.remove('show');
  $('errorBanner').style.display = 'none';
  hideThinking();
  $('questionBar').classList.add('visible');

  fetch(`${CONFIG.socketURL}/api/debate/start`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      topic,
      maxRounds: CONFIG.maxRounds,
      agents: ['zhuangzi', 'nietzsche', 'beauvoir'],
    }),
  })
    .then((r) => r.json())
    .then((data) => {
      if (data.debateId) {
        currentDebateId = data.debateId;
        socket.emit('join_debate', data.debateId);
      }
      if (data.messages) {
        data.messages.forEach((m) => {
          if (m.type === 'collision') addCollision(m.intensity);
          else addCard(
            m.agentId || m.speaker || m.agent,
            m.content || m.text,
            m.round || 0
          );
        });
      }
    })
    .catch(() => {
      currentDebateId = 'demo_' + Date.now();
      const demo = [
        { s: 'zhuangzi', t: `е…ідәҺ"${topic}"вҖ”вҖ”еӨ©ең°дёҺжҲ‘е№¶з”ҹпјҢдёҮзү©дёҺжҲ‘дёәдёҖгҖӮ`, r: 1 },
        { t: 'collision', i: 0.55 },
        { s: 'nietzsche', t: `${topic}пјҹз”Ёй”Өеӯҗж•ІзўҺж—§зҹіжқҝпјҒи¶…дәәеҲӣйҖ д»·еҖјгҖӮ`, r: 1 },
        { t: 'collision', i: 0.7 },
        { s: 'beauvoir', t: `${topic}вҖ”вҖ”иҮӘз”ұд»ҺжқҘдёҚжҳҜдёҖдёӘдәәзҡ„дәӢдёҡгҖӮжҲ‘зҡ„иҮӘз”ұд»Ҙд»–иҖ…зҡ„иҮӘз”ұдёәеүҚжҸҗгҖӮ`, r: 2 },
      ];
      let i = 0;
      (function n() {
        if (i >= demo.length) {
          $('statScore').textContent = 'demo';
          return;
        }
        const m = demo[i++];
        if (m.t === 'collision') addCollision(m.i);
        else addCard(m.s, m.t, m.r);
        setTimeout(n, 1200 + Math.random() * 800);
      })();
    })
    .finally(() => {
      $('btnStart').disabled = false;
    });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// иҝҪй—®
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function askQuestion() {
  const input = $('questionInput');
  const question = input.value.trim();
  if (!question || !currentDebateId) return;
  input.value = '';

  // еңЁиҲһеҸ°жҳҫзӨәиҝҪй—?
  const stage = $('debateStage');
  const qEl = document.createElement('div');
  qEl.className = 'debate-card';
  qEl.style.cssText = 'text-align:right;padding:16px 24px;background:var(--card-bg-alt);';
  qEl.innerHTML = `<div class="card-body" style="padding-left:0;font-style:italic;">рҹ’¬ ${question}</div>`;
  stage.appendChild(qEl);
  smartScroll(qEl);

  fetch(`${CONFIG.socketURL}/api/spectator/question`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ debateId: currentDebateId, question }),
  }).catch(() => {
    socket.emit('user_message', {
      debateId: currentDebateId,
      agentId: 'zhuangzi',
      message: question,
    });
  });
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
// е…ій—ӯжҠҘе‘Ҡ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•?
function closeReport() {
  $('reportOverlay').classList.remove('show');
}
</script>
